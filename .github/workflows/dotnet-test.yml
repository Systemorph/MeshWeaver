# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: MeshWeaver Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Run Unit tests
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore workloads
      run: dotnet workload restore
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore -p:CIRun=true
    - name: Run Tests
      continue-on-error: true
      env:
        DOTNET_ENVIRONMENT: Development
        Logging__LogLevel__Default: Warning
      run: |
        # Only Cosmos is excluded — needs the Cosmos emulator which is heavy to
        # set up on a runner. Everything else runs (PostgreSql via Testcontainers
        # using pre-installed Docker, Orleans via in-proc TestCluster, Acme/FutuRe
        # via dynamic Code-piece compilation).
        #
        # set +e so a hung/aborted test host (non-zero exit) doesn't terminate
        # the loop — we want EVERY csproj to attempt to run, then surface what
        # broke after the loop completes. Without this, pipefail propagates a
        # single hang into a hard SIGTERM that kills sibling test projects and
        # the artifact-upload step has nothing to publish.
        set +e
        echo "::group::Per-project test runs"
        for csproj in $(find test -name '*.csproj' ! -path '*Cosmos*' | sort); do
          name=$(basename "$csproj" .csproj)
          echo "::endgroup::"
          echo "::group::$name"
          dotnet test "$csproj" --no-build --verbosity normal -l:trx \
              --blame-hang-timeout 90s --blame-hang-dump-type mini \
              2>&1 | tee -a test/test-results.log
          rc=$?
          echo "[CI] $name exit=$rc" | tee -a test/test-results.log
        done
        echo "::endgroup::"
        exit 0
    - name: Fail on hang / aborted test run
      # `dotnet test --blame-hang-timeout 90s` aborts the test host on hang and
      # writes "Test Run Aborted" + "Total tests: Unknown" to stdout. The trx
      # produced has no Failed records, so Publish Test Results below sees only
      # what completed and reports green — masking the hang. This step makes the
      # masking explicit: if any "Total tests: Unknown" or hang-dump line is
      # present in the log, fail the job AND list the project that hung
      # (the "[CI] $name exit=$rc" markers from Run Tests pinpoint it).
      run: |
        if grep -qE "Total tests: Unknown|Test host process crashed|Collecting hang dumps" test/test-results.log; then
          echo "::error::A test process hung or crashed during the run."
          echo "--- Hang/crash markers ---"
          grep -E "Total tests: Unknown|Test host process crashed|Collecting hang dumps|Test Run Aborted" test/test-results.log || true
          echo "--- Per-project exit codes (look for non-zero) ---"
          grep -E '^\[CI\] ' test/test-results.log || true
          exit 1
        fi
    - name: Collect test logs for artifact
      if: always()
      run: |
        mkdir -p collected-logs
        # Find all test-logs directories and collect their contents without renaming
        find . -path "*/bin/*/test-logs/*.log" -type f -exec cp {} collected-logs/ \; 2>/dev/null || true
    - name: Publish Test Results
#      uses: EnricoMi/publish-unit-test-result-action/composite@v2
      uses: EnricoMi/publish-unit-test-result-action@v2.12.0
      if: always()
      with:
        action_fail: true
        # File patterns of test result files. Relative paths are known to work best, while the composite action also works with absolute paths. Supports "*", "**", "?", and "[]" character ranges. Use multiline string for multiple patterns. Patterns starting with "!" exclude the matching files. There have to be at least one pattern starting without a "!". 
        files: |
          test/**/*.trx
    - name: "Upload artifact: Test Results"
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: testResults
        path: |
          test/**/*.trx
          test/test-results.log
          collected-logs/
        compression-level: 9
        retention-days: 15
