name: Continuous Delivery (main)

# CONTINUOUS-channel delivery: every merge to main that PASSES the test suite ships a
# fresh deployment image and rolls it out to every environment.
#
#   push main ─▶ "MeshWeaver Build and Test" (existing) ─▶ [THIS] images ─▶ deploy (memex, atioz, memex-cloud)
#
# Why workflow_run (and not push: branches:[main]): we want the image+deploy to fire ONLY
# after the full test suite is green on the merged commit — never ship an image that failed
# tests. workflow_run starts after the named workflow COMPLETES; the `if` below filters to a
# successful run that came from a push to main (not a PR run, not a failed run).
#
# This is the CONTINUOUS channel (build-numbered 3.0.0-ci.<build> baked in, images tagged by
# commit SHA). The RELEASED channel — clean 3.0.0 NuGet packages + clean GHCR images — is a
# SEPARATE path fired by pushing a v*.*.* tag (release-packages.yml + release-images.yml).
# "Freeze a release" = push a tag; "merge to main" = this workflow.
#
# The portal and migration images build in PARALLEL jobs: the migration image is small
# (~5 min) and used to run sequentially after the portal's ~18-minute multi-arch publish on
# the same runner — a free ~5 min off every merge-to-deployed cycle. Each job is
# self-contained (checkout → az login → publish); the duplicated setup (~3 min) runs
# concurrently so it costs no wall-clock.
on:
  workflow_run:
    workflows: ["MeshWeaver Build and Test"]
    types: [completed]

# id-token: write is required for OIDC federated login to Azure (no stored client secret).
permissions:
  contents: read
  id-token: write

# Never let two main merges deploy concurrently — a later merge waits for the in-flight
# rollout rather than racing it. cancel-in-progress:false so we don't abort a half-done deploy.
concurrency:
  group: main-cd
  cancel-in-progress: false

env:
  ACR: meshweaver.azurecr.io
  AKS_RG: memex-aks-rg
  AKS_CLUSTER: memexaks-cluster

jobs:
  # ─────────────────────────── BUILD + PUSH IMAGES ───────────────────────────
  # Two parallel legs, one per image. No `dotnet workload restore` in either:
  # CI logs prove it installs nothing ("No workloads installed for this feature
  # band … Successfully updated workload(s): .") and burned ~75 s per run.
  portal-image:
    name: "Build + push portal-ai image"
    # Gate: only a SUCCESSFUL test run, from a PUSH (not a PR), on main.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          # Build the EXACT commit the tests passed on — not whatever main is now.
          ref: ${{ github.event.workflow_run.head_sha }}
      # The SDK container build + the publish output overflow the runner's ~14 GB; reclaim the
      # ~25 GB of preinstalled tooling a .NET build never touches (same as the test workflow).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          dotnet: false
          android: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # The image is tagged with the VERSION (3.0.0-ci.<run#>) AND the short SHA AND the moving `main`.
      # The version tag is what each install's self-updater (ReleaseStrategy.md) compares to decide a
      # rollout — so it MUST be the monotonic $(Version) (Directory.Build.props derives the .ci.<n>
      # suffix from $GITHUB_RUN_NUMBER). -getProperty:Version prints the computed version without
      # building; CIRun=true so it matches the version baked into the published binaries below.
      - name: Compute image tags (version + short SHA)
        id: vars
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          VERSION=$(dotnet msbuild memex/aspire/Memex.Portal.Distributed/Memex.Portal.Distributed.csproj \
            -getProperty:Version -p:CIRun=true -nologo | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed image version: $VERSION (run #$GITHUB_RUN_NUMBER)"
      # OIDC federated login — no client secret stored. Requires a federated credential on the
      # Azure AD app scoped to this repo's main branch (see the README block at the bottom).
      - name: Ensure Azure CLI
        # GitHub's ubuntu-latest no longer ships the Azure CLI on PATH for azure/login@v2
        # ("Unable to locate executable file: az"). Install it if missing (idempotent).
        run: command -v az >/dev/null || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR login
        run: az acr login --name meshweaver
      # portal-ai app image — the deployment image (aspnet + node + Claude Code/Copilot CLIs),
      # layered on the base already in ACR. The base (memex-portal-ai-base) changes rarely and is
      # rebuilt by the release path / runbook §1, NOT on every main merge.
      # CIRun=true → continuous version 3.0.0-ci.<build> baked in; image tagged <sha> + moving `main`.
      #
      # MULTI-ARCH: we drop `-r linux-x64` and instead set ContainerRuntimeIdentifiers to
      # "linux-x64;linux-arm64". With no single RID set, the SDK (>= 8.0.405; we're on .NET 10)
      # publishes per-RID and combines the results into an OCI Image Index (manifest list) — so one tag
      # serves both x86 cloud nodes AND Apple-silicon (arm64) local k3s, which can then pull-and-self-
      # update natively from ACR instead of hand-building locally. ContainerRuntimeIdentifiers MUST be a
      # subset of RuntimeIdentifiers — that subset requirement is why <RuntimeIdentifiers>linux-x64;linux-arm64
      # </RuntimeIdentifiers> is declared INSIDE Memex.Portal.Distributed.csproj (project-local), NOT as a
      # global `-p:RuntimeIdentifiers` here: a global `-p:` propagates to every ProjectReference and makes
      # ~6 referenced libraries fail `NETSDK1083: RuntimeIdentifier 'linux-x64;linux-arm64' is not recognized`.
      # No Docker is needed: pushing the index straight to a remote registry (ContainerRegistry set) is Docker-free.
      # 🚨 PREREQUISITE: memex-portal-ai-base:latest in ACR must itself be MULTI-ARCH, else the arm64 leg
      # has no base layer and this step fails. base-image-acr.yml (workflow_dispatch) builds it multi-arch
      # (buildx → ACR); operators doing the first multi-arch roll run that once (see LocalColimaMac.md).
      # 🚨 List-valued `-p:` props are wrapped '"a;b"' — single-quoted DOUBLE-quotes around a REAL `;`, NOT
      # `%3B`. `%3B` is an MSBuild-ESCAPED (literal) semicolon, so `-p:ContainerRuntimeIdentifiers=a%3Bb` is a
      # SINGLE RID value "a;b" that NEVER splits into a list — the SDK then builds ONE image with the bogus RID
      # "linux-x64;linux-arm64" and fails (OutputPath MSB4115 / NETSDK1083). The '"…"' form (the SDK's own
      # documented Bash escaping) keeps the value one CLI switch while letting MSBuild split the real `;` into a
      # 2-item list. Applies to ContainerRuntimeIdentifiers AND ContainerImageTags (every `-p:` whose value is a `;`-list).
      - name: Build + push portal-ai
        run: >
          dotnet publish memex/aspire/Memex.Portal.Distributed/Memex.Portal.Distributed.csproj
          -c Release --no-self-contained -t:PublishContainer -p:PublishProfile=
          -p:ContainerRuntimeIdentifiers='"linux-x64;linux-arm64"'
          -p:CIRun=true
          -p:ContainerRegistry=${{ env.ACR }}
          -p:ContainerRepository=memex-portal-ai
          -p:ContainerImageTags='"${{ steps.vars.outputs.version }};${{ steps.vars.outputs.sha }};main"'
          -p:ContainerBaseImage=${{ env.ACR }}/memex-portal-ai-base:latest

  migration-image:
    name: "Build + push migration image"
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          dotnet: false
          android: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # Same $(Version) computation as the portal leg: both jobs run inside ONE
      # workflow run, so GITHUB_RUN_NUMBER — and therefore the computed
      # 3.0.0-ci.<n> tag — is identical across the two legs by construction.
      - name: Compute image tags (version + short SHA)
        id: vars
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          VERSION=$(dotnet msbuild memex/aspire/Memex.Database.Migration/Memex.Database.Migration.csproj \
            -getProperty:Version -p:CIRun=true -nologo | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed image version: $VERSION (run #$GITHUB_RUN_NUMBER)"
      - name: Ensure Azure CLI
        run: command -v az >/dev/null || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR login
        run: az acr login --name meshweaver
      # migration — lean image on the standard (already multi-arch) aspnet base; same multi-arch publish.
      # <RuntimeIdentifiers> lives in Memex.Database.Migration.csproj (project-local, same reason as above).
      - name: Build + push migration
        run: >
          dotnet publish memex/aspire/Memex.Database.Migration/Memex.Database.Migration.csproj
          -c Release --no-self-contained -t:PublishContainer -p:PublishProfile=
          -p:ContainerRuntimeIdentifiers='"linux-x64;linux-arm64"'
          -p:CIRun=true
          -p:ContainerRegistry=${{ env.ACR }}
          -p:ContainerRepository=memex-migration
          -p:ContainerImageTags='"${{ steps.vars.outputs.version }};${{ steps.vars.outputs.sha }};main"'

  # ─────────────────────────────── NO DEPLOY JOB ─────────────────────────────
  # Deployment is PULL-BASED, not push. CI's job ends at "publish the image to ACR" (the image
  # jobs above). Each installation — memex / atioz / memex-cloud AND every external install in the
  # world that prod knows nothing about — runs the in-portal self-updater
  # (memex/Memex.Portal.Shared/SelfUpdate): it polls ACR with its OWN workload identity, and, per its
  # own Admin/UpdatePolicy (Continuous/Stable/None + the CI-green gate), patches its OWN portal +
  # migration Deployments via its OWN in-cluster ServiceAccount token. So CI needs NO cluster
  # credentials — which is also why the old `az aks command invoke` deploy job was deleted: it
  # required a central service principal with per-cluster Azure RBAC (the `commandResults/read`
  # authorization failure on 2026-06-29), a model that cannot scale to installs prod doesn't manage.
  # See SelfUpdate.md / DEPLOY-RUNBOOK.md for enabling self-update on an environment (the SA + RBAC are
  # in the Helm chart; set selfUpdate.azureClientId and grant the UAMI AcrPull).
