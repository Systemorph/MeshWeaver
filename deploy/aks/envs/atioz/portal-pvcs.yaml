# ---------------------------------------------------------------------------
# portal-pvcs.yaml (atioz) — ReadWriteMany Azure Files PVCs for the atioz portal,
# in the `atioz` namespace. Uses the cluster-scoped `azurefile-memex`
# StorageClass (already created for the systemorph env — shared, cluster-wide).
#
# No Postgres PVC here: atioz uses the shared `memexaks-pg` Flexible Server
# (database `atioz`), and the chart's in-cluster pg StatefulSet is scaled to 0.
#
#   kubectl apply -n atioz -f portal-pvcs.yaml
# ---------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memex-data
  namespace: atioz
  labels:
    app.kubernetes.io/component: memex-portal
spec:
  accessModes: [ReadWriteMany]
  storageClassName: azurefile-memex
  resources:
    requests:
      storage: 16Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memex-content
  namespace: atioz
  labels:
    app.kubernetes.io/component: memex-portal
spec:
  accessModes: [ReadWriteMany]
  storageClassName: azurefile-memex
  resources:
    requests:
      storage: 64Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memex-attachments
  namespace: atioz
  labels:
    app.kubernetes.io/component: memex-portal
spec:
  accessModes: [ReadWriteMany]
  storageClassName: azurefile-memex
  resources:
    requests:
      storage: 32Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memex-users
  namespace: atioz
  labels:
    app.kubernetes.io/component: memex-portal
spec:
  accessModes: [ReadWriteMany]
  storageClassName: azurefile-memex
  resources:
    requests:
      storage: 16Gi
