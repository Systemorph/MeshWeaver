# ===========================================================================
# SecretProviderClass (atioz) — mounts atioz's secrets from the SHARED
# `Systemorph` Key Vault into the atioz portal pod via the AKS Key Vault Secrets
# Provider (CSI) add-on, and syncs them into a K8s Secret the portal reads via
# `envFrom`. Same vault + same add-on identity as the systemorph env; only the
# secret NAMES and the namespace differ.
#
# KV secrets consumed:
#   AzureFoundry-ApiKey                       SHARED  -> AzureFoundry__ApiKey
#   atioz-Ai-KeyProtection-MasterKey          atioz   -> Ai__KeyProtection__MasterKey
#   atioz-Authentication-Microsoft-ClientSecret atioz -> Authentication__Microsoft__ClientSecret
#
# The CSI driver only syncs while a pod MOUNTS the volume, so the atioz portal
# Deployment is patched (see deploy.sh) to mount this SPC + envFrom the synced
# `atioz-portal-ai-secrets` secret.
#
# atioz starts with an EMPTY database, so a fresh master key is safe (there are
# no existing enc: provider keys to render undecryptable — unlike the running
# systemorph deployment, where the master key must never change).
# ===========================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: atioz-portal-ai-secrets
  namespace: atioz
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # azureKeyvaultSecretsProvider add-on user-assigned identity on memexaks-cluster.
    userAssignedIdentityID: "6c9dcc8d-d5b3-4545-afa1-209b33e8a1ba"
    keyvaultName: "Systemorph"
    tenantId: "3a01d7ac-3330-444d-942d-975eb491b5d6"
    objects: |
      array:
        - |
          objectName: AzureFoundry-ApiKey
          objectType: secret
        - |
          objectName: atioz-Ai-KeyProtection-MasterKey
          objectType: secret
        - |
          objectName: atioz-Authentication-Microsoft-ClientSecret
          objectType: secret
  secretObjects:
    - secretName: atioz-portal-ai-secrets
      type: Opaque
      data:
        - objectName: AzureFoundry-ApiKey
          key: AzureFoundry__ApiKey
        - objectName: atioz-Ai-KeyProtection-MasterKey
          key: Ai__KeyProtection__MasterKey
        - objectName: atioz-Authentication-Microsoft-ClientSecret
          key: Authentication__Microsoft__ClientSecret
