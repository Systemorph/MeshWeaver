# Copy to values.deploy.yaml ONLY if you are NOT sourcing secrets from Key Vault.
# Keep it OUT of git. The atioz env sources its secrets from the `Systemorph`
# Key Vault via the CSI SecretProviderClass (secretproviderclass.yaml):
#   AzureFoundry-ApiKey                          (shared AI key)
#   atioz-Ai-KeyProtection-MasterKey             (atioz envelope key)
#   atioz-Authentication-Microsoft-ClientSecret  (atioz Entra app secret)
# ...so for the standard KV-backed deploy this file is unnecessary — the only
# runtime secret injected outside the KV is the Postgres connection string,
# which deploy.sh patches from $MEMEX_PG_CONN.
#
# Provide values here only to override/bypass the KV path:
secrets:
  memex_portal:
    # Postgres password is carried inside $MEMEX_PG_CONN (deploy.sh); not needed here.
    # Authentication__Microsoft__ClientSecret: "<ENTRA_CLIENT_SECRET>"   # if not using KV
    # Ai__KeyProtection__MasterKey: "<BASE64_32_BYTE_KEY>"               # if not using KV
config:
  memex_portal:
    # Non-secret Entra app identity (also set in values.atioz.yaml; override here if needed):
    # Authentication__Microsoft__ClientId: "<ENTRA_APP_ID>"
    Authentication__Microsoft__TenantId: "3a01d7ac-3330-444d-942d-975eb491b5d6"
