# SecretProviderClass (memex-cloud) — pulls the prod-migrated secrets from the
# shared `Systemorph` Key Vault into ns memex-cloud and syncs them into the
# `memexcloud-portal-ai-secrets` K8s secret (envFrom'd by the portal). The master
# key is the REUSED prod key (so stored enc: provider keys stay decryptable).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: memexcloud-portal-ai-secrets
  namespace: memex-cloud
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "6c9dcc8d-d5b3-4545-afa1-209b33e8a1ba"
    keyvaultName: "Systemorph"
    tenantId: "3a01d7ac-3330-444d-942d-975eb491b5d6"
    objects: |
      array:
        - |
          objectName: memexcloud-Ai-KeyProtection-MasterKey
          objectType: secret
        - |
          objectName: memexcloud-Anthropic-ApiKey
          objectType: secret
        - |
          objectName: memexcloud-AzureAIS-ApiKey
          objectType: secret
        - |
          objectName: memexcloud-Authentication-Microsoft-ClientSecret
          objectType: secret
        - |
          objectName: memexcloud-Authentication-LinkedIn-ClientSecret
          objectType: secret
        - |
          objectName: memexcloud-Social-LinkedIn-ClientSecret
          objectType: secret
  secretObjects:
    - secretName: memexcloud-portal-ai-secrets
      type: Opaque
      data:
        - { objectName: memexcloud-Ai-KeyProtection-MasterKey, key: Ai__KeyProtection__MasterKey }
        - { objectName: memexcloud-Anthropic-ApiKey, key: Anthropic__ApiKey }
        - { objectName: memexcloud-AzureAIS-ApiKey, key: AzureAIS__ApiKey }
        - { objectName: memexcloud-Authentication-Microsoft-ClientSecret, key: Authentication__Microsoft__ClientSecret }
        - { objectName: memexcloud-Authentication-LinkedIn-ClientSecret, key: Authentication__LinkedIn__ClientSecret }
        - { objectName: memexcloud-Social-LinkedIn-ClientSecret, key: Social__LinkedIn__ClientSecret }
