# ===========================================================================
# values.memexcloud.yaml — Helm overlay for memex.meshweaver.cloud on AKS.
#
# Migration of the production portal off Azure Container Apps (prod-memex) onto
# the shared memexaks-cluster, namespace `memex-cloud`, pinned to the D16s_v5
# `silos` node pool. Mirrors prod's config: Claude (Anthropic) + AzureAIS models,
# the prod Entra app (77bc55bb…, multi-tenant) + LinkedIn sign-in, and the prod
# encryption master key (reused so stored enc: provider keys stay decryptable).
#
# Data: the prod `memex` database was dumped + restored into `memexcloud` on the
# shared memexaks-pg server; content is copied blob -> /mnt/content (Azure Files).
#
# FIRST cut deploys single-silo (Localhost, replicas: 1) to verify the migrated
# prod data renders, then flips to AdoNet clustering + HPA 2-6 (see README).
# ===========================================================================
secrets:
  memex_portal:
    ConnectionStrings__memex: ""                 # patched by deploy.sh -> PG `memexcloud`
    # All of the following come from the Key Vault via the SecretProviderClass:
    Ai__KeyProtection__MasterKey: ""             # REUSED prod master key (memexcloud-Ai-KeyProtection-MasterKey)
    Anthropic__ApiKey: ""
    AzureAIS__ApiKey: ""
    Authentication__Microsoft__ClientSecret: ""
    Authentication__LinkedIn__ClientSecret: ""
    Social__LinkedIn__ClientSecret: ""

config:
  memex_portal:
    MEMEX_HOST: "memex-postgres-service"
    MEMEX_PORT: "5432"
    MEMEX_USERNAME: "postgres"
    MEMEX_JDBCCONNECTIONSTRING: "jdbc:postgresql://memex-postgres-service:5432/memexcloud"
    MEMEX_DATABASENAME: "memexcloud"
    ASPNETCORE_HTTP_PORTS: "8080"
    Deployment__Backend: "Filesystem"
    Deployment__DataRoot: "/data"
    # First verify single-silo; flip to AdoNet for HPA 2-6 (README "elastic flip").
    Deployment__Orleans__Clustering: "Localhost"
    Storage__Name: "content"
    Storage__SourceType: "FileSystem"
    Storage__BasePath: "/mnt/content"
    Graph__Storage__Type: "PostgreSql"
    Graph__Storage__BasePath: "/data/graph"
    Mcp__BaseUrl: "http://memex-portal-service:8080"
    # ---- AI: mirror prod — Claude (Anthropic) heavy/standard/light + AzureAIS --
    Anthropic__Endpoint: "https://s-meshweaver.services.ai.azure.com/anthropic/"
    Anthropic__Order: "1"
    Anthropic__Models__0: "claude-opus-4-7"
    Anthropic__Models__1: "claude-sonnet-4-6"
    Anthropic__Models__2: "claude-haiku-4-5"
    AzureAIS__Endpoint: "https://fy-meshweaver3-dev-swc-001.services.ai.azure.com/models"
    AzureAIS__Order: "0"
    ModelTier__Heavy: "claude-opus-4-7"
    ModelTier__Standard: "claude-sonnet-4-6"
    ModelTier__Light: "claude-haiku-4-5"
    ModelTier__Utility: "claude-haiku-4-5"
    ClaudeCode__ConfigDirRoot: "/mnt/users"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    # ---- Sign-in: mirror prod — Microsoft (multi-tenant) + LinkedIn -----------
    # No TenantId set => "common" (any Microsoft account), exactly as prod. The
    # Entra app 77bc55bb… already lists https://memex.meshweaver.cloud/signin-microsoft.
    Authentication__Provider: "Custom"
    Authentication__EnableDevLogin: "false"
    Authentication__Microsoft__ClientId: "77bc55bb-f33c-4dfa-8cd9-b67eb865716a"
    Authentication__LinkedIn__ClientId: "780dsuvyxglmc4"
    Social__LinkedIn__ClientId: "780dsuvyxglmc4"

image:
  registry: "meshweaver.azurecr.io"
  portal: "memex-portal-ai"
  migration: "memex-migration"
  tag: "latest"
  pullPolicy: "IfNotPresent"

# Generous — runs on the dedicated D16s_v5 silos pool (16 vCPU / 64 GiB).
resources:
  portal:
    requests: { cpu: "4", memory: "8Gi" }
    limits:   { cpu: "6", memory: "16Gi" }

replicas:
  portal: 1          # first verify; -> 2 with AdoNet + HPA 2-6 (elastic flip)
  postgres: 1        # chart's in-cluster pg — scaled to 0 (we use the Flexible Server)

persistence:
  data:        { storageClass: "azurefile-memex", accessMode: "ReadWriteMany", mountPath: "/data",            size: "16Gi" }
  content:     { storageClass: "azurefile-memex", accessMode: "ReadWriteMany", mountPath: "/mnt/content",     size: "128Gi" }
  attachments: { storageClass: "azurefile-memex", accessMode: "ReadWriteMany", mountPath: "/mnt/attachments", size: "64Gi" }
  users:       { storageClass: "azurefile-memex", accessMode: "ReadWriteMany", mountPath: "/mnt/users",       size: "32Gi" }

ingress:
  enabled: true
  className: "webapprouting.kubernetes.azure.com"
  host: "memex.meshweaver.cloud"
  tls:
    enabled: true
    secretName: "memexcloud-tls"
  sessionAffinity:
    enabled: true
    cookieName: "MEMEXCLOUD_AFFINITY"

pgbackrest:
  enabled: false
