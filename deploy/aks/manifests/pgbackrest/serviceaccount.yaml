# ---------------------------------------------------------------------------
# serviceaccount.yaml — Workload-Identity service account for pgBackRest pods.
#
# The federated identity created in infra/modules/storage.bicep trusts the
# subject  system:serviceaccount:memex:pgbackrest-sa . The
# azure.workload.identity/client-id annotation tells the AKS Workload Identity
# webhook which managed identity to project a token for, giving pgBackRest
# KEYLESS access to the backup blob container.
#
# Replace <PGBACKREST_IDENTITY_CLIENT_ID> with the pgBackRestIdentityClientId
# output from the infra deployment (or set pgbackrest.azure.workloadIdentityClientId
# in values.aks.yaml and template it).
#
#   kubectl apply -n memex -f serviceaccount.yaml
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pgbackrest-sa
  namespace: memex
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: "<PGBACKREST_IDENTITY_CLIENT_ID>"
