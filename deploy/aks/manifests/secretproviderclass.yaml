# ===========================================================================
# SecretProviderClass — mounts the AzureFoundry API key from the `Systemorph`
# Key Vault into the portal pod via the AKS Key Vault Secrets Provider (CSI)
# add-on, and syncs it into a K8s Secret the portal reads via `envFrom`.
#
# Apply alongside the Helm release. The portal Deployment MUST mount this SPC as
# a CSI volume for the `secretObjects` sync to fire (the CSI driver only syncs to
# a K8s Secret while a pod mounts the volume). See the volume / volumeMount /
# envFrom patch in Doc/Architecture/DeploymentOptions.md.
#
# Prereqs:
#   • azureKeyvaultSecretsProvider add-on enabled on memexaks-cluster (it is).
#   • Its user-assigned identity (clientId below) has GET on Systemorph KV secrets
#     — RBAC role "Key Vault Secrets User" on the vault, or an access policy with
#     secret get/list.
#
# NOTE: the encryption master key (Ai:KeyProtection:MasterKey) is intentionally
# NOT managed here — it is provided out-of-band and overriding it would make every
# stored `enc:` provider key undecryptable. Add it to `objects`/`secretObjects`
# ONLY if you point it at the exact same value the running deployment already uses.
# ===========================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: memex-portal-ai-secrets
  namespace: memex
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # azureKeyvaultSecretsProvider add-on user-assigned identity (clientId) on memexaks-cluster.
    userAssignedIdentityID: "6c9dcc8d-d5b3-4545-afa1-209b33e8a1ba"
    keyvaultName: "Systemorph"
    tenantId: "3a01d7ac-3330-444d-942d-975eb491b5d6"
    objects: |
      array:
        - |
          objectName: AzureFoundry-ApiKey
          objectType: secret
        - |
          objectName: Ai-KeyProtection-MasterKey
          objectType: secret
  # Sync the mounted KV secrets into a K8s Secret the portal envFrom's. The secret KEY is the env
  # var name → config key: AzureFoundry__ApiKey → AzureFoundry:ApiKey (the AzureFoundry factory key),
  # Ai__KeyProtection__MasterKey → Ai:KeyProtection:MasterKey (the at-rest envelope key — MUST equal
  # the value the deployment already uses, or stored enc: provider keys become undecryptable).
  secretObjects:
    - secretName: memex-portal-ai-secrets
      type: Opaque
      data:
        - objectName: AzureFoundry-ApiKey
          key: AzureFoundry__ApiKey
        - objectName: Ai-KeyProtection-MasterKey
          key: Ai__KeyProtection__MasterKey
