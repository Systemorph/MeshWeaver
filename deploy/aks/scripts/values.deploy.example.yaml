# Copy to values.deploy.yaml, fill in REAL values, and keep it OUT of git (it holds secrets —
# stage it under artifacts/ or source the secrets from Key Vault via CSI in production).
# Layered last by deploy.sh: helm ... -f values.yaml -f values.aks.yaml -f values.deploy.yaml
secrets:
  memex_migration:
    memex_postgres_password: "<PG_PASSWORD>"
    # NOTE: the chart hardcodes the in-cluster pg in ConnectionStrings__memex; deploy.sh patches
    # the rendered secret with $MEMEX_PG_CONN afterwards, so the value here is not authoritative.
  memex_portal:
    memex_postgres_password: "<PG_PASSWORD>"
    # base64 of 32 random bytes — envelope key for stored provider credentials at rest
    Ai__KeyProtection__MasterKey: "<BASE64_32_BYTE_KEY>"
    # OAuth client SECRETS (the ClientIds are non-secret -> config below)
    Authentication__Microsoft__ClientSecret: "<ENTRA_CLIENT_SECRET>"
    Authentication__Google__ClientSecret: "<GOOGLE_CLIENT_SECRET>"
    Authentication__LinkedIn__ClientSecret: "<LINKEDIN_CLIENT_SECRET>"
config:
  memex_portal:
    # 1 replica => Localhost. For >1 replica use AzureTables clustering (follow-up).
    Deployment__Orleans__Clustering: "Localhost"
    Authentication__Provider: "Custom"
    Authentication__EnableDevLogin: "false"
    # Microsoft/Entra single-tenant home directory
    Authentication__Microsoft__ClientId: "<ENTRA_APP_ID>"
    Authentication__Microsoft__TenantId: "<TENANT_GUID>"
    # Leave a provider's ClientId empty to NOT offer it on the login page
    Authentication__Google__ClientId: "<GOOGLE_CLIENT_ID>"
    Authentication__LinkedIn__ClientId: "<LINKEDIN_CLIENT_ID>"
