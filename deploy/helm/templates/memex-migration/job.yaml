---
# Run-once migration JOB.
#
# 🚨 This WAS a Deployment (replicas: 1) — which re-ran the migration FOREVER: every time the
# migration process exited 0, the Deployment restarted it, and each run rebuilds the
# public.top_level_index materialized view across EVERY partition schema (CPU-heavy). Over a day
# that was 310 restarts pegging a full core — the "benign CrashLoopBackOff" the docs assumed was
# actually a CPU storm. A Job runs to completion and STOPS.
#
# The name embeds .Release.Revision so a fresh Job is created on every `helm upgrade` (so a NEW
# migration still runs), and ttlSecondsAfterFinished auto-cleans the completed Job. The config +
# secret stay regular (non-hook) resources, so there is no pre-hook ordering problem — they are
# applied with the chart and available when the Job runs.
apiVersion: "batch/v1"
kind: "Job"
metadata:
  name: "memex-migration-{{ .Release.Revision }}"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "memex-migration"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "memex-migration"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      restartPolicy: "Never"
      initContainers:
        # Postgres and the migration can start concurrently on a fresh install; gate on Postgres
        # TCP readiness so the migration doesn't fail-fast before the DB accepts connections.
        - name: "wait-for-postgres"
          image: "busybox:1.36"
          command:
            - "sh"
            - "-c"
            - "until nc -z memex-postgres-service 5432; do echo 'waiting for postgres'; sleep 2; done"
      containers:
        - image: "ghcr.io/systemorph/memex-migration:latest"
          name: "memex-migration"
          envFrom:
            - configMapRef:
                name: "memex-migration-config"
            - secretRef:
                name: "memex-migration-secrets"
          imagePullPolicy: "IfNotPresent"
