---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "memex-portal-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "memex-portal"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "memex-portal"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "ghcr.io/systemorph/memex-portal-ai:latest"
          name: "memex-portal"
          envFrom:
            - configMapRef:
                name: "memex-portal-config"
            - secretRef:
                name: "memex-portal-secrets"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 8080
          volumeMounts:
            - name: "memex-data"
              mountPath: "/data"
            - name: "memex-users"
              mountPath: "/mnt/users"
          imagePullPolicy: "IfNotPresent"
      volumes:
        - name: "memex-data"
          emptyDir: {}
        - name: "memex-users"
          emptyDir: {}
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "memex-portal"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
