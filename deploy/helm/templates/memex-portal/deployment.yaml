---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "memex-portal-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "memex-portal"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "memex-portal"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
        {{- with .Values.selfUpdate }}
        {{- if .azureClientId }}
        # Opt the pod into the Azure workload-identity webhook (injects the federated token so the
        # self-updater can list ACR tags). Only when a client id is configured.
        azure.workload.identity/use: "true"
        {{- end }}
        {{- end }}
    spec:
      # The in-pod self-updater patches this deployment via the Kubernetes API using this SA's
      # projected token (RBAC in rbac.yaml). See Doc/Architecture/ReleaseStrategy.
      serviceAccountName: "memex-portal-sa"
      initContainers:
        # Postgres and the portal start concurrently on a fresh install; the portal's hub
        # init FAILS (and the host aborts) if Postgres isn't yet accepting connections.
        # Gate startup on Postgres TCP readiness so the ordering is deterministic.
        - name: "wait-for-postgres"
          image: "busybox:1.36"
          command:
            - "sh"
            - "-c"
            - "until nc -z memex-postgres-service 5432; do echo 'waiting for postgres'; sleep 2; done"
      containers:
        - image: "ghcr.io/systemorph/memex-portal-ai:latest"
          name: "memex-portal"
          envFrom:
            - configMapRef:
                name: "memex-portal-config"
            - secretRef:
                name: "memex-portal-secrets"
          env:
            # 🩺 Crash diagnostics. We hit a native SIGSEGV (exit 139) in the Npgsql → SslStream TLS
            # read path: the process dies with NO managed exception, so the logs show nothing useful.
            # Write a dump to the persistent /data volume (a hostPath that survives the restart on the
            # same node) so the next crash — and the heap, to confirm/refute the suspected leak — is
            # analyzable. Type 2 = heap (WithPrivateReadWriteMemory). Dumps only appear on crash.
            - name: "DOTNET_DbgEnableMiniDump"
              value: "1"
            - name: "DOTNET_DbgMiniDumpType"
              value: "2"
            - name: "DOTNET_DbgMiniDumpName"
              value: "/data/dumps/coredump.%p.%t"
            - name: "DOTNET_CreateDumpDiagnostics"
              value: "1"
          {{- with .Values.selfUpdate }}
          {{- if .azureClientId }}
            # Explicit AZURE_CLIENT_ID for the self-updater's ACR credential (the workload-identity
            # webhook also injects this; set here so it's correct even without the webhook).
            - name: "AZURE_CLIENT_ID"
              value: "{{ .azureClientId }}"
          {{- end }}
          {{- end }}
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 8080
{{- if (.Values.grpc).enabled }}
            # Public h2c gRPC (the trusted port binds 127.0.0.1 and is same-pod only — not listed).
            - name: "grpc"
              protocol: "TCP"
              containerPort: {{ .Values.grpc.port }}
{{- end }}
          volumeMounts:
            - name: "memex-data"
              mountPath: "/data"
            - name: "memex-users"
              mountPath: "/mnt/users"
          imagePullPolicy: "IfNotPresent"
          # 🚦 Zero-502 rollouts. Without a readiness probe a pod counts as "Ready" the moment its
          # container starts — long before the app serves (Orleans + mesh + static-repo import take
          # tens of seconds) — so a rollout sends traffic to a still-booting pod → 502. /health
          # (all health checks pass) is the "actually serving" signal; combined with maxUnavailable:0
          # below the old pod is kept until the new one passes /health.
          startupProbe:
            # Generous window for a cold boot (schema provisioning + static import). While this is
            # failing, readiness/liveness are suspended, so a slow boot is never flagged unhealthy.
            httpGet: { path: /health, port: 8080 }
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            # ⚠️ /alive (light: process-up), NOT /health (heavy: DB + mesh checks). /health as the
            # readiness probe is the "probe death-spiral": under load a heavy /health times out (5s) →
            # 3 fails → the pod is yanked from the Service endpoints → 503 flapping, and the connection
            # churn that follows aggravates the SslStream SIGSEGV. The rollout gate stays correct
            # because the STARTUP probe below already holds readiness on /health until the mesh is up
            # (so no 502 to a booting pod); once up, /alive keeps a serving pod in rotation and never
            # flaps it out. (Fixed live 2026-07-21; it regressed because the fix wasn't in this chart.)
            httpGet: { path: /alive, port: 8080 }
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            # Self-heal a genuinely wedged pod (the connection-exhaustion wedge we hit). Conservative
            # — only a sustained /alive failure restarts it, so a transient blip never loops.
            httpGet: { path: /alive, port: 8080 }
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
{{- range $lang, $gate := (.Values.grpc).gates }}
{{- if and $gate.enabled $gate.image }}
        # ---- {{ $lang }} gate (TRUSTED co-deployed participant — see .Values.grpc.gates) ----------
        # Same pod ⇒ shares the network namespace ⇒ reaches the portal's 127.0.0.1-bound trusted gRPC
        # endpoint. That reachability IS the authentication (no token). Executes `{{ $lang }}` Code
        # nodes exactly as the in-process Roslyn kernel executes C# ones. Rendered only when the
        # language is enabled AND an image is supplied.
        - name: "{{ $lang }}-gate"
          image: "{{ $gate.image }}"
          imagePullPolicy: "IfNotPresent"
          env:
            - name: "MESH_GRPC_URL"
              value: "http://127.0.0.1:{{ $.Values.grpc.trustedPort }}"
            - name: "MESH_GATE_ADDRESS"
              value: "{{ $gate.address }}"
          resources:
            requests: { cpu: "25m", memory: "64Mi" }
            limits: { memory: "256Mi" }
          securityContext:
            # The image already runs as a non-root uid; harden the rest.
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
{{- end }}
{{- end }}
      volumes:
        - name: "memex-data"
{{- if .Values.persistDataVolume }}
          # Local dev only: keep /data (the DataProtection keys under /data/dataprotection-keys, plus the
          # nuget/compile caches) on a node hostPath so a pod restart does NOT wipe the keys and invalidate
          # every session (the "have to refresh / Anonymous resubscribe loop" churn). Single-node k3s;
          # multiple pods during a rollout share the same node dir. Prod (AKS) leaves this false and
          # persists keys to Azure Blob instead, so /data can stay ephemeral there.
          hostPath:
            path: /var/lib/memex-portal-data
            type: DirectoryOrCreate
{{- else }}
          emptyDir: {}
{{- end }}
        - name: "memex-users"
          emptyDir: {}
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "memex-portal"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      # 0 → the OLD pod is kept serving until the NEW pod passes its readiness probe (/health). With
      # a single replica this is what turns a rollout from "brief outage" into zero-downtime: traffic
      # only moves once the replacement actually serves. (If the new pod can't come up — e.g. the PG
      # connection-exhaustion wedge — the rollout simply stalls with the old pod still serving, no 502.)
      maxUnavailable: 0
    type: "RollingUpdate"
