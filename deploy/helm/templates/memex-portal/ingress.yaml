{{- if .Values.ingress.enabled }}
# ---- Portal Ingress (TLS termination at the ingress controller) ------------
# A standard k8s Ingress fronting memex-portal-service. The controller (e.g.
# ingress-nginx) terminates TLS for `host` using `tlsSecret` and proxies HTTP to
# the pod, setting X-Forwarded-Proto/Host — the portal clears KnownProxies and
# trusts those, so OAuth redirect_uri is built as https://<host>/signin-*.
# Disabled by default (neutral chart); an overlay sets host + tlsSecret + class.
---
apiVersion: "networking.k8s.io/v1"
kind: "Ingress"
metadata:
  name: "memex-portal-ingress"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "memex-portal"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecret | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
{{- if (.Values.portalNext).enabled }}
          # ---- Next.js React GUI (FEATURE-FLAGGED — see .Values.portalNext) ---
          # nginx matches the LONGEST prefix first regardless of order, so /next/*
          # (the app + its /next/_next assets) hits portal-next while everything
          # else — including /api, gRPC-web and _blazor that the React app calls
          # same-origin — falls through to the Blazor portal below. The app is
          # built with basePath: "/next", so NO rewrite annotation is needed.
          - path: "/next"
            pathType: "Prefix"
            backend:
              service:
                name: "portal-next-service"
                port:
                  number: 3000
{{- end }}
          - path: "/"
            pathType: "Prefix"
            backend:
              service:
                name: "memex-portal-service"
                port:
                  number: {{ .Values.config.memex_portal.ASPNETCORE_HTTP_PORTS | default 8080 }}
{{- if (.Values.grpc).enabled }}
# ---- Native gRPC on the SAME host (backend-protocol is per-Ingress-resource) ----
# ONLY the bidi participant connection (meshweaver.v1.Mesh/Open) is native gRPC — a second Ingress
# on the same host routes exactly that method to the portal's h2c gRPC port with backend-protocol
# GRPC, so participants connect to the ordinary portal URL over TLS (nginx serves HTTP/2 on 443),
# no extra DNS or certs. 🚨 Deliberately NOT the whole /meshweaver.v1.Mesh prefix: the gRPC-WEB
# split (Connect + Deliver — the React GUI's browser transport) shares that prefix but is
# HTTP/1.1, and grpc_pass would break it; it keeps falling through to the web ingress above.
---
apiVersion: "networking.k8s.io/v1"
kind: "Ingress"
metadata:
  name: "memex-portal-grpc-ingress"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "memex-portal"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    # Long-lived bidi streams (the participant connection IS one Open stream) — keep the proxy
    # from idling them out.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecret | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: "/meshweaver.v1.Mesh/Open"
            pathType: "Exact"
            backend:
              service:
                name: "memex-portal-service"
                port:
                  number: {{ .Values.grpc.port }}
{{- end }}
# ---- MCP + its OAuth flow pinned to ONE pod (stateful per-pod sessions) ------
# /mcp (Streamable HTTP) and its OAuth endpoints (/register /authorize /token) keep session +
# dynamic-client-registration + issued-token state IN-MEMORY PER POD. With >1 replica, the site's
# cookie affinity does NOT help (the MCP HTTP client doesn't carry the cookie), so requests bounce
# between pods → "authenticated user does not match the session" / "rejected on reconnect". A
# dedicated Ingress routes the whole flow to a SINGLE pod via a constant hash ($host) so
# registration, token and session all land together. Low traffic; if that pod dies the consistent
# hash remaps to a live one (reconnect once). Real fix: shared/distributed MCP session state.
---
apiVersion: "networking.k8s.io/v1"
kind: "Ingress"
metadata:
  name: "memex-portal-mcp-ingress"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "memex-portal"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  annotations:
    nginx.ingress.kubernetes.io/upstream-hash-by: "$host"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecret | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: "/mcp"
            pathType: "Prefix"
            backend:
              service:
                name: "memex-portal-service"
                port:
                  number: {{ .Values.config.memex_portal.ASPNETCORE_HTTP_PORTS | default 8080 }}
          - path: "/register"
            pathType: "Prefix"
            backend:
              service:
                name: "memex-portal-service"
                port:
                  number: {{ .Values.config.memex_portal.ASPNETCORE_HTTP_PORTS | default 8080 }}
          - path: "/authorize"
            pathType: "Prefix"
            backend:
              service:
                name: "memex-portal-service"
                port:
                  number: {{ .Values.config.memex_portal.ASPNETCORE_HTTP_PORTS | default 8080 }}
          - path: "/token"
            pathType: "Prefix"
            backend:
              service:
                name: "memex-portal-service"
                port:
                  number: {{ .Values.config.memex_portal.ASPNETCORE_HTTP_PORTS | default 8080 }}
{{- end }}
