---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "memex-portal-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "memex-portal"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  ConnectionStrings__memex: "Host=memex-postgres-service;Port=5432;Username=postgres;Password={{ .Values.secrets.memex_portal.memex_postgres_password }};Database=memex"
  # Content indexing writes its tables into per-partition schemas in THIS same mesh database
  # (content_chunks/content_files alongside each partition's mesh_nodes) — no separate connection.
  MEMEX_PASSWORD: "{{ .Values.secrets.memex_portal.memex_postgres_password }}"
  MEMEX_URI: "postgresql://postgres:{{ .Values.secrets.memex_portal.memex_postgres_password }}@memex-postgres-service:5432/memex"
  # ---- AI provider keys (secret) -------------------------------------------
  # Conditionally emitted: a key is set ONLY when its value is non-empty, so the chart never
  # overwrites a value injected out-of-band (Key Vault CSI / kubectl). This matters most for
  # Ai__KeyProtection__MasterKey — overwriting it makes every stored enc: provider key
  # undecryptable. Source real values from Key Vault via the CSI add-on; never commit them.
  {{- if .Values.secrets.memex_portal.Anthropic__ApiKey }}
  Anthropic__ApiKey: "{{ .Values.secrets.memex_portal.Anthropic__ApiKey }}"
  {{- end }}
  {{- if .Values.secrets.memex_portal.AzureFoundry__ApiKey }}
  AzureFoundry__ApiKey: "{{ .Values.secrets.memex_portal.AzureFoundry__ApiKey }}"
  {{- end }}
  {{- if .Values.secrets.memex_portal.Embedding__ApiKey }}
  Embedding__ApiKey: "{{ .Values.secrets.memex_portal.Embedding__ApiKey }}"
  {{- end }}
  {{- if .Values.secrets.memex_portal.Ai__KeyProtection__MasterKey }}
  Ai__KeyProtection__MasterKey: "{{ .Values.secrets.memex_portal.Ai__KeyProtection__MasterKey }}"
  {{- end }}
type: "Opaque"
