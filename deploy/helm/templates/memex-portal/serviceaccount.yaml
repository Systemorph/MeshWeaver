---
# Service account the portal pod runs as, so the in-pod self-updater can authenticate to the
# Kubernetes API (via the projected token) to patch its own deployment. On AKS, the
# azure.workload.identity/client-id annotation federates this SA to a UAMI (AcrPull on the registry)
# so the same pod can also list ACR tags. Empty client id (local/self-host) → no annotation; the
# in-cluster patch still works, ACR polling just won't authenticate.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "memex-portal-sa"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "memex-portal"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  {{- with .Values.selfUpdate }}
  {{- if .azureClientId }}
  annotations:
    azure.workload.identity/client-id: "{{ .azureClientId }}"
  {{- end }}
  {{- end }}
