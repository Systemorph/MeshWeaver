parameters: {}
# Local dev only (memex-local sets this true via --set): persist /data — the DataProtection keys under
# /data/dataprotection-keys plus the nuget/compile caches — on a node hostPath, so a pod restart does NOT
# wipe the keys and invalidate every session (the "have to refresh / Anonymous resubscribe loop" churn).
# Prod (AKS) leaves this false (default) and persists DataProtection keys to Azure Blob instead.
persistDataVolume: false
# ---- Self-update (in-pod patch of the portal's own deployment) -------------
# The portal polls the registry and, on Kubernetes, patches its own deployment to a newer image per
# the Admin/UpdatePolicy node (see Doc/Architecture/ReleaseStrategy). The chart always creates the
# ServiceAccount + RBAC so the pod CAN patch its own deployments (works on local k3s too). For ACR
# polling on AKS, set azureClientId to the workload-identity UAMI client id (AcrPull on the registry);
# leave empty for local/self-host (the in-cluster patch still works; ACR polling just won't auth).
selfUpdate:
  azureClientId: ""
# ---- External Ollama (local self-host) ------------------------------------
# Front a host-native Ollama with an in-cluster Service so the portal addresses
# it by name (http://ollama:11434/v1) instead of a host-gateway IP. On macOS the
# GPU is reachable only from host processes (Docker/k8s have no Metal passthrough),
# so Ollama runs on the host and `host` is the cluster's host gateway (Colima:
# 192.168.5.2). Disabled by default (neutral chart); a local overlay turns it on.
ollama:
  external:
    enabled: false
    host: ""        # cluster host-gateway IP of the host running Ollama
    port: 11434
# ---- Native gRPC (HTTP/2) for foreign-language participants ---------------
# The mesh gRPC service (meshweaver.v1.Mesh/Open — the bidi participant connection the Python /
# Node SDKs use) needs real HTTP/2 end-to-end; the browser path (HTTP/1.1 + gRPC-web) is not
# enough. Enabled: Kestrel gets TWO extra endpoints beside the 8080 web port —
#   * port (8081): PUBLIC h2c gRPC, exposed via the service and (when ingress.enabled) a same-host
#     ingress whose /meshweaver.v1.Mesh path proxies with backend-protocol GRPC — so participants
#     connect to the ordinary portal URL over TLS, no extra DNS or certs.
#   * trustedPort (8082): TRUSTED endpoint bound to 127.0.0.1 — reachable ONLY from containers in
#     the portal's own pod (the shipped node / bun / python gates). Reachability IS the
#     authentication: no API token, nothing to rotate; deliveries may carry through the requesting
#     user's AccessContext (see GrpcOptions.TrustedPort).
grpc:
  enabled: true
  port: 8081
  trustedPort: 8082
  # ---- Language gates (execute foreign-language Code nodes as co-deployed sidecars) ---------------
  # A gate is a TRUSTED participant sidecar in the portal pod that connects to the trusted loopback
  # endpoint above (127.0.0.1:{trustedPort}) — reachability across the shared pod network namespace IS
  # the authentication, no token. It is the foreign-language counterpart of the in-process Roslyn
  # kernel: a Code node whose Language routes to the matching gate (CodeNodeType.ResolveKernelAddress),
  # runs, and writes its result back onto the run's Activity node.
  #
  # FEATURE FLAG per language: by default ALL languages are INCLUDED (enabled: true) — set a gate's
  # enabled:false to opt a language out. A gate actually RUNS when it is enabled AND its image is
  # supplied (built from deploy/{python,node}-gate/Dockerfile, pushed to a registry the cluster can
  # pull); image left empty ⇒ no sidecar, so a bare install never crash-loops on a missing image.
  gates:
    python:
      enabled: true
      image: ""
      address: "py/python-kernel"
    node:
      enabled: true
      image: ""
      address: "node/node-kernel"
# ---- Portal Ingress (TLS via an ingress controller) -----------------------
# Off by default (cloud envs wire ingress/TLS their own way). A self-host overlay
# enables it with a hostname + a pre-created TLS secret. The proxy-*-timeout
# annotations keep the Blazor Server SignalR circuit (WebSocket) alive.
ingress:
  enabled: false
  className: "nginx"
  host: ""          # e.g. memex.localtest.me (resolves to 127.0.0.1)
  tlsSecret: ""     # name of a kubernetes.io/tls secret in this namespace
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # 🚨 The browser's live connection is gRPC-WEB server-streaming (meshweaver.v1.Mesh/Connect,
    # mesh→client) over THIS web ingress — not the native /Open path. nginx buffers proxied responses
    # by DEFAULT, which holds a streaming response until its buffer fills or the upstream closes: the
    # browser then receives only a truncated SUBSET of frames and the stream dies
    # (ERR_CONNECTION_CLOSED) — the "page renders a random subset / stops prematurely" bug. The
    # stream must flush frame-by-frame, so response buffering MUST be off.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
# ---- Next.js React portal (experimental frontend — FEATURE-FLAGGED) --------
# When enabled, a Next.js streaming-SSR build of the React GUI (clients/portal-next)
# runs as its OWN Deployment beside memex-portal, and the portal ingress gains a
# `/next` path routed to it (nginx longest-prefix: /next/* → portal-next, everything
# else — incl. /api, gRPC-web, _blazor the React app calls same-origin — falls through
# to the Blazor portal). The Blazor shell also gets Portal:ReactAppUrl=/next injected
# (see the portal ConfigMap), which lights up the reversible PER-USER toggle: the user
# menu's "Try the new frontend" → GET /frontend/react sets the mw-frontend cookie and
# redirects to /next; "Back to classic" → /frontend/blazor reverses it. The DEPLOYMENT
# DEFAULT frontend stays Blazor (Portal:Frontend is left unset) — this is opt-in, not a
# forced switch. Off by default (neutral chart): prod/AKS is unaffected until an overlay
# sets portalNext.enabled=true with an image the cluster can pull. Locally, memex-local
# builds the image and flips this on automatically. See clients/portal-next/DEPLOY.md.
portalNext:
  enabled: false
  # Container image. memex-local builds + tags this into Colima's Docker store and k3s
  # loads it IfNotPresent. For AKS, push to ACR and override this + enabled in an overlay.
  image: "meshweaver/portal-next:local"
  replicas: 1
  # Server-side (SSR) token mint + snapshot fetch go straight to the portal Service,
  # skipping the ingress round-trip. The BROWSER still talks same-origin (cookies +
  # gRPC-web are ingress-routed), so this only affects SSR.
  portalOrigin: "http://memex-portal-service:8080"
secrets:
  memex_postgres:
    memex_postgres_password: ""
  memex_migration:
    ConnectionStrings__memex: ""
    memex_postgres_password: ""
    MEMEX_URI: ""
  memex_portal:
    ConnectionStrings__memex: ""
    memex_postgres_password: ""
    MEMEX_URI: ""
    # AI provider keys — empty by default (neutral chart). Set in an overlay
    # (e.g. values.aks.yaml) or via --set / Key Vault CSI. Empty = no system
    # catalog seeded for that provider.
    Anthropic__ApiKey: ""
    AzureFoundry__ApiKey: ""
    Ai__KeyProtection__MasterKey: ""
config:
  memex_postgres:
    POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    POSTGRES_USER: "postgres"
  memex_migration:
    MEMEX_HOST: "memex-postgres-service"
    MEMEX_PORT: "5432"
    MEMEX_USERNAME: "postgres"
    MEMEX_JDBCCONNECTIONSTRING: "jdbc:postgresql://memex-postgres-service:5432/memex"
    MEMEX_DATABASENAME: "memex"
  memex_portal:
    MEMEX_HOST: "memex-postgres-service"
    MEMEX_PORT: "5432"
    MEMEX_USERNAME: "postgres"
    MEMEX_JDBCCONNECTIONSTRING: "jdbc:postgresql://memex-postgres-service:5432/memex"
    MEMEX_DATABASENAME: "memex"
    ASPNETCORE_HTTP_PORTS: "8080"
    Deployment__Backend: "Filesystem"
    Deployment__DataRoot: "/data"
    Deployment__Orleans__Clustering: "Localhost"
    Storage__Name: "content"
    Storage__SourceType: "FileSystem"
    Storage__BasePath: "/data/content"
    Graph__Storage__Type: "PostgreSql"
    Graph__Storage__BasePath: "/data/graph"
    Mcp__BaseUrl: "http://memex-portal-service:8080"
    # AI model catalog — empty by default. An overlay sets endpoints + model
    # lists (+ keys in secrets above) to seed the system catalog on deploy.
    Anthropic__Endpoint: ""
    Anthropic__Models__0: ""
    Anthropic__Models__1: ""
    Anthropic__Models__2: ""
    AzureFoundry__Endpoint: ""
    AzureFoundry__Models__0: ""
    AzureFoundry__Models__1: ""
    AzureFoundry__Models__2: ""
    ModelTier__Heavy: ""
    ModelTier__Standard: ""
    ModelTier__Light: ""
    ModelTier__Utility: ""
    ClaudeCode__ConfigDirRoot: ""
    # ---- System email (Microsoft Graph) — BIDIRECTIONAL. Off by default; an
    # overlay turns it on per environment by setting Email__Enabled + the env's
    # own MailboxAddress / TenantId / ClientId (+ WebhookBaseUrl for inbound).
    # The secret Email__ClientSecret comes from the SecretProviderClass.
    Email__Enabled: "false"
    Email__MailboxAddress: ""
    Email__TenantId: ""
    Email__ClientId: ""
    Email__UseManagedIdentity: "false"
    Email__InboundEnabled: "false"
    Email__WebhookBaseUrl: ""
    # Shared webhook-guard value Graph echoes on every inbound notification; the
    # /api/email webhook rejects mismatches. Global (same across envs is fine —
    # each deployment validates against its own configured value).
    Email__SubscriptionClientState: "meshweaver-emailhook-7f3c9a21e84b46d2b1c05e9af6d3"
