<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="acme-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <pattern id="acme-pattern" patternUnits="userSpaceOnUse" width="24" height="24">
      <rect width="24" height="24" fill="url(#acme-grad)"/>
      <path d="M0 12 L12 0 L24 12 L12 24 Z" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="128" height="128" rx="16" fill="url(#acme-pattern)"/>
  <!-- Stylized "A" mark -->
  <g transform="translate(64,64)">
    <!-- Triangle shape -->
    <polygon points="0,-38 32,30 -32,30" fill="none" stroke="white" stroke-width="4"/>
    <!-- Horizontal bar through triangle -->
    <line x1="-20" y1="10" x2="20" y2="10" stroke="white" stroke-width="4"/>
    <!-- Inner triangle accent -->
    <polygon points="0,-20 14,14 -14,14" fill="#3B82F6" opacity="0.5"/>
  </g>
  <!-- Company name -->
  <text x="64" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">ACME</text>
</svg>
