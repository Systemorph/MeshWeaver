<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <pattern id="default-logo-pattern" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#4B5563"/>
      <rect x="0" y="0" width="8" height="8" fill="#6B7280" opacity="0.5"/>
      <rect x="8" y="8" width="8" height="8" fill="#6B7280" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#default-logo-pattern)"/>
  <!-- Generic building icon -->
  <g transform="translate(64,58)">
    <!-- Building shape -->
    <rect x="-28" y="-30" width="56" height="50" rx="4" fill="#9CA3AF"/>
    <!-- Windows grid -->
    <rect x="-22" y="-24" width="10" height="10" rx="2" fill="#4B5563"/>
    <rect x="-6" y="-24" width="10" height="10" rx="2" fill="#4B5563"/>
    <rect x="12" y="-24" width="10" height="10" rx="2" fill="#4B5563"/>
    <rect x="-22" y="-8" width="10" height="10" rx="2" fill="#4B5563"/>
    <rect x="-6" y="-8" width="10" height="10" rx="2" fill="#4B5563"/>
    <rect x="12" y="-8" width="10" height="10" rx="2" fill="#4B5563"/>
    <!-- Door -->
    <rect x="-8" y="8" width="16" height="12" rx="2" fill="#374151"/>
  </g>
  <!-- Org text -->
  <text x="64" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D1D5DB" text-anchor="middle">ORG</text>
</svg>
