<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <pattern id="roland-pattern" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(30)">
      <rect width="10" height="10" fill="#1E3A5F"/>
      <circle cx="5" cy="5" r="2" fill="#3B82F6"/>
    </pattern>
    <clipPath id="roland-clip">
      <circle cx="64" cy="64" r="60"/>
    </clipPath>
  </defs>
  <circle cx="64" cy="64" r="60" fill="url(#roland-pattern)"/>
  <g clip-path="url(#roland-clip)">
    <!-- Head -->
    <circle cx="64" cy="42" r="20" fill="#F5D0C5"/>
    <!-- Hair (short, dark) -->
    <ellipse cx="64" cy="30" rx="18" ry="10" fill="#2D3748"/>
    <rect x="48" y="28" width="32" height="8" rx="4" fill="#2D3748"/>
    <!-- Face -->
    <circle cx="64" cy="44" r="18" fill="#F5D0C5"/>
    <!-- Eyes -->
    <circle cx="57" cy="42" r="2.5" fill="#1F2937"/>
    <circle cx="71" cy="42" r="2.5" fill="#1F2937"/>
    <!-- Glasses -->
    <rect x="51" y="38" width="12" height="8" rx="2" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <rect x="65" y="38" width="12" height="8" rx="2" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <line x1="63" y1="42" x2="65" y2="42" stroke="#4A5568" stroke-width="1.5"/>
    <!-- Smile -->
    <path d="M58 51 Q64 55 70 51" stroke="#1F2937" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Body/Shoulders (business shirt) -->
    <ellipse cx="64" cy="95" rx="32" ry="28" fill="#E2E8F0"/>
    <!-- Collar -->
    <path d="M52 78 L64 88 L76 78" stroke="#3B82F6" stroke-width="3" fill="none"/>
    <!-- Tie -->
    <path d="M64 88 L60 100 L64 105 L68 100 Z" fill="#3B82F6"/>
  </g>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#1E3A5F" stroke-width="4"/>
</svg>
