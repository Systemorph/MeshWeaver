<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <style>
    .bg { fill: #f5f5f5; }
    .fg { fill: #616161; }
    .detail { fill: #e0e0e0; }
  </style>
  <rect class="bg" width="24" height="24" rx="4"/>
  <!-- Factory main building -->
  <rect class="fg" x="2" y="10" width="20" height="12" rx="1"/>
  <!-- Left smokestack -->
  <rect class="fg" x="4" y="4" width="3" height="6" rx="0.5"/>
  <!-- Right smokestack -->
  <rect class="fg" x="10" y="6" width="3" height="4" rx="0.5"/>
  <!-- Windows -->
  <rect class="detail" x="4" y="13" width="3" height="3" rx="0.5"/>
  <rect class="detail" x="9" y="13" width="3" height="3" rx="0.5"/>
  <!-- Door -->
  <rect class="detail" x="15" y="14" width="5" height="8" rx="0.5"/>
</svg>
