<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <style>
    .bg { fill: #f5f5f5; }
    .fg { fill: #616161; }
    .detail { fill: #e0e0e0; }
  </style>
  <rect class="bg" width="24" height="24" rx="4"/>
  <!-- Main tower -->
  <rect class="fg" x="8" y="4" width="8" height="18" rx="1"/>
  <!-- Left wing -->
  <rect class="fg" x="2" y="10" width="6" height="12" rx="1"/>
  <!-- Right wing -->
  <rect class="fg" x="16" y="10" width="6" height="12" rx="1"/>
  <!-- Tower windows -->
  <rect class="detail" x="10" y="7" width="4" height="3" rx="0.5"/>
  <rect class="detail" x="10" y="12" width="4" height="3" rx="0.5"/>
  <!-- Wing windows -->
  <rect class="detail" x="3.5" y="13" width="3" height="3" rx="0.5"/>
  <rect class="detail" x="17.5" y="13" width="3" height="3" rx="0.5"/>
  <!-- Entrance -->
  <rect class="detail" x="10.5" y="17" width="3" height="5" rx="0.5"/>
</svg>
