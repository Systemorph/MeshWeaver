<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Inbox/stack of items -->
  <rect x="12" y="40" width="40" height="16" rx="3" stroke="currentColor" stroke-width="2" fill="none"/>
  <path d="M16 44h24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16 50h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Stacked cards behind -->
  <rect x="14" y="32" width="36" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="var(--neutral-layer-1, white)" opacity="0.8"/>
  <rect x="16" y="24" width="32" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="var(--neutral-layer-1, white)" opacity="0.6"/>
  <rect x="18" y="16" width="28" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="var(--neutral-layer-1, white)" opacity="0.4"/>

  <!-- Unassigned indicator -->
  <circle cx="48" cy="44" r="6" fill="var(--accent-fill-rest, #0078d4)"/>
  <text x="48" y="47" text-anchor="middle" font-size="8" font-weight="bold" fill="white">?</text>
</svg>
