<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 79" fill="none">
  <style>
    .bg { fill: #fdf6f6; }
    .nf { fill: #616161; }
    .af { fill: #d13438; }
  </style>
  <!-- Background -->
  <rect class="bg" width="140" height="79" rx="8"/>

  <!-- Tray / box: "M45 48h50v14a3 3 0 0 1-3 3H48a3 3 0 0 1-3-3V48z" stroke-width=2 -->
  <!-- Outer filled path (expanded by 1 outward), inner bg path (shrunk by 1 inward) -->
  <path class="nf" d="M44 47h52v15a4 4 0 0 1-4 4H48a4 4 0 0 1-4-4V47z"/>
  <path class="bg" d="M46 49h48v13a2 2 0 0 1-2 2H48a2 2 0 0 1-2-2V49z"/>

  <!-- Tray opening notch: "M45 48l8-8h34l8 8" stroke-width=2 -->
  <!-- Convert to filled polygon shape representing the notch outline -->
  <polygon class="nf" points="44,49 52,41 88,41 96,49 94,49 87,43 53,43 46,49"/>

  <!-- Arrow shaft: x=70 y1=12 y2=40 stroke-width=3 round cap -->
  <rect class="af" x="68.5" y="12" width="3" height="28" rx="1.5"/>

  <!-- Arrow head: "points=58,30 70,42 82,30" stroke-width=3 round -->
  <!-- Convert polyline to filled chevron polygon (thick V shape) -->
  <polygon class="af" points="56.9,31.1 58,29.1 70,41.1 82,29.1 83.1,31.1 70,44.2"/>
</svg>
