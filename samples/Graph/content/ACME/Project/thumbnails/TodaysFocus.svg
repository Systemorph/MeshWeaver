<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 79" fill="none">
  <style>
    .bg { fill: var(--neutral-layer-1, #fafafa); }
    .nf { fill: currentColor; }
    .af { fill: var(--accent-fill-rest, #d13438); }
    .sf { fill: var(--neutral-layer-1, white); }
  </style>
  <!-- Background -->
  <rect class="bg" width="140" height="79" rx="8"/>

  <!-- Bullseye: 3 concentric circle outlines -->
  <!-- Outer: cx=70 cy=40 r=30 stroke-width=2 -->
  <circle class="nf" cx="70" cy="40" r="31"/>
  <circle class="bg" cx="70" cy="40" r="29"/>
  <!-- Middle: cx=70 cy=40 r=20 stroke-width=2 -->
  <circle class="nf" cx="70" cy="40" r="21"/>
  <circle class="bg" cx="70" cy="40" r="19"/>
  <!-- Inner: cx=70 cy=40 r=10 stroke-width=2 -->
  <circle class="nf" cx="70" cy="40" r="11"/>
  <circle class="bg" cx="70" cy="40" r="9"/>
  <!-- Center dot (already filled) -->
  <circle class="af" cx="70" cy="40" r="4"/>

  <!-- Clock indicator: circle cx=108 cy=16 r=11 stroke-width=1.5 with sf fill -->
  <circle class="nf" cx="108" cy="16" r="11.75"/>
  <circle class="sf" cx="108" cy="16" r="10.25"/>
  <!-- Clock hands: "M108 11v5l3 3" sw=1.5 round => filled shapes -->
  <!-- Vertical shaft: x=108, y1=11 y2=16, width=1.5 -->
  <rect class="af" x="107.25" y="11" width="1.5" height="5" rx="0.75"/>
  <!-- Diagonal hand: from (108,16) to (111,19) at 45deg, length ~4.24, sw=1.5 -->
  <rect class="af" x="108" y="15.25" width="4.24" height="1.5" rx="0.75" transform="rotate(45 108 16)"/>
</svg>
