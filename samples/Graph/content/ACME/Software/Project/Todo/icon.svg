<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#FEE2E2"/>
  <!-- Task list container -->
  <rect x="10" y="8" width="44" height="48" rx="4" stroke="#78716C" stroke-width="2.5" fill="none"/>
  <!-- Header bar -->
  <rect x="10" y="8" width="44" height="10" rx="4" fill="rgba(220,38,38,0.08)"/>
  <path d="M10 18h44" stroke="#78716C" stroke-width="1.5"/>
  <!-- Task 1 - completed -->
  <rect x="16" y="24" width="10" height="10" rx="2" stroke="#DC2626" stroke-width="2" fill="rgba(220,38,38,0.15)"/>
  <path d="M18 29l2.5 2.5 4-4" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="30" y="27" width="18" height="4" rx="1" fill="#78716C"/>
  <!-- Task 2 - in progress -->
  <rect x="16" y="40" width="10" height="10" rx="2" stroke="#78716C" stroke-width="2" fill="none"/>
  <rect x="30" y="43" width="14" height="4" rx="1" fill="#A8A29E"/>
  <!-- Gear accent (bottom right) -->
  <circle cx="48" cy="48" r="6" fill="none" stroke="#DC2626" stroke-width="1.5" opacity="0.6"/>
  <circle cx="48" cy="48" r="2" fill="#DC2626" opacity="0.6"/>
  <!-- Gear teeth -->
  <line x1="48" y1="41.5" x2="48" y2="43" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="48" y1="53" x2="48" y2="54.5" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="41.5" y1="48" x2="43" y2="48" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="53" y1="48" x2="54.5" y2="48" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
