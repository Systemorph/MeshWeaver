<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 79" fill="none">
  <style>
    .bg { fill: #fdf6f6; }
    .nf { fill: #616161; }
    .af { fill: #d13438; }
  </style>
  <!-- Background -->
  <rect class="bg" width="140" height="79" rx="8"/>
  <!-- Dashboard frame (outer nf rect, inner bg rect) -->
  <!-- Original: rect x=10 y=8 w=120 h=62 rx=4 stroke-width=2 -->
  <rect class="nf" x="9" y="7" width="122" height="64" rx="5"/>
  <rect class="bg" x="11" y="9" width="118" height="60" rx="3"/>
  <!-- Chart bars with red accent -->
  <rect class="af" x="20" y="46" width="10" height="18" rx="1" opacity="0.4"/>
  <rect class="af" x="36" y="38" width="10" height="26" rx="1" opacity="0.55"/>
  <rect class="af" x="52" y="30" width="10" height="34" rx="1" opacity="0.7"/>
  <rect class="af" x="68" y="36" width="10" height="28" rx="1" opacity="0.85"/>
  <rect class="af" x="84" y="24" width="10" height="40" rx="1"/>
  <rect class="af" x="100" y="32" width="10" height="32" rx="1" opacity="0.75"/>
  <!-- Stats line (horizontal line: x1=20 x2=120 y=17 stroke-width=1.5, round cap) -->
  <rect class="nf" x="20" y="16.25" width="100" height="1.5" rx="0.75"/>
  <!-- Stat dots -->
  <circle class="nf" cx="20" cy="17" r="2"/>
  <circle class="nf" cx="70" cy="17" r="2"/>
  <circle class="nf" cx="120" cy="17" r="2"/>
</svg>
