<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="acmeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <pattern id="acmeToolPattern" patternUnits="userSpaceOnUse" width="24" height="24">
      <rect width="24" height="24" fill="url(#acmeGrad)"/>
      <path d="M0 12 L12 0 L24 12 L12 24 Z" fill="none" stroke="#F87171" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="128" height="128" rx="16" fill="url(#acmeToolPattern)"/>
  <!-- Crossed hammer and wrench behind text -->
  <g transform="translate(64,52)" opacity="0.85">
    <!-- Wrench (left, angled) -->
    <g transform="rotate(-30)">
      <rect x="-3" y="-32" width="6" height="40" rx="2" fill="white" opacity="0.9"/>
      <circle cx="0" cy="-32" r="8" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
      <path d="M-5,-36 L0,-28 L5,-36" fill="url(#acmeGrad)" stroke="none"/>
    </g>
    <!-- Hammer (right, angled) -->
    <g transform="rotate(30)">
      <rect x="-3" y="-30" width="6" height="38" rx="2" fill="white" opacity="0.9"/>
      <rect x="-12" y="-42" width="24" height="14" rx="3" fill="white" opacity="0.9"/>
      <!-- Hammer face detail -->
      <rect x="-10" y="-40" width="8" height="10" rx="1" fill="#DC2626" opacity="0.3"/>
    </g>
  </g>
  <!-- Company name -->
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="6">ACME</text>
  <!-- Subtle tagline -->
  <text x="64" y="120" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="2">SOFTWARE</text>
</svg>
