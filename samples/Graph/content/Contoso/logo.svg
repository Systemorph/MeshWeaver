<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="currentColor"/>
  <!-- Abstract "C" made of circles -->
  <g transform="translate(64,56)">
    <!-- Main arc -->
    <path d="M 20,-30 A 35,35 0 1,0 20,30" fill="none" stroke="var(--neutral-layer-1, #fafafa)" stroke-width="8" stroke-linecap="round"/>
    <!-- Accent dots -->
    <circle cx="20" cy="-30" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="20" cy="30" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <!-- Inner element -->
    <circle cx="-5" cy="0" r="12" fill="none" stroke="var(--neutral-layer-1, #fafafa)" stroke-width="3" opacity="0.7"/>
    <circle cx="-5" cy="0" r="4" fill="var(--neutral-layer-1, #fafafa)" opacity="0.7"/>
  </g>
  <!-- Company name -->
  <text x="64" y="115" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="var(--neutral-layer-1, #fafafa)" text-anchor="middle" letter-spacing="2">CONTOSO</text>
</svg>
