    .accent { fill: var(--accent-fill-rest, #0078d4); }
    .wh { fill: var(--neutral-layer-1, #ffffff); }
  </style>
  <rect class="bg" width="64" height="64" rx="8"/>
  <!-- Open book -->
  <rect class="wh" x="8" y="14" width="48" height="36" rx="3"/>
  <rect class="accent" x="31" y="14" width="2" height="36"/>
  <!-- Left page lines -->
