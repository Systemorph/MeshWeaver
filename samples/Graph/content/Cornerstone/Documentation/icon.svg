  <rect class="fg" x="13" y="28" width="11" height="2" rx="1" opacity="0.35"/>
  <rect class="fg" x="13" y="34" width="14" height="2" rx="1" opacity="0.25"/>
  <!-- Right page lines -->
  <rect class="fg" x="37" y="22" width="14" height="2" rx="1" opacity="0.5"/>
  <rect class="fg" x="37" y="28" width="11" height="2" rx="1" opacity="0.35"/>
  <rect class="fg" x="37" y="34" width="14" height="2" rx="1" opacity="0.25"/>
  <!-- Small shield accent -->
  <path class="accent" d="M48 6 L54 9 V14 C54 17 51 19 48 20 C45 19 42 17 42 14 V9 Z" opacity="0.7"/>
