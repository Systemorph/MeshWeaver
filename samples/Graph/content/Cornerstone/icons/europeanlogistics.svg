<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <defs>
    <linearGradient id="logisticsGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Truck cabin -->
  <rect x="15" y="8" width="7" height="10" rx="1" fill="url(#logisticsGradient)"/>
  <!-- Cabin window -->
  <rect x="17" y="10" width="4" height="3" rx="0.5" fill="#e2e8f0"/>
  <!-- Cargo container -->
  <rect x="2" y="6" width="13" height="12" rx="1" fill="url(#logisticsGradient)" opacity="0.8"/>
  <!-- Container lines -->
  <line x1="6" y1="6" x2="6" y2="18" stroke="#e2e8f0" stroke-width="0.5" opacity="0.5"/>
  <line x1="10" y1="6" x2="10" y2="18" stroke="#e2e8f0" stroke-width="0.5" opacity="0.5"/>
  <!-- Wheels -->
  <circle cx="6" cy="20" r="2" fill="#1e3a5f" stroke="#60a5fa" stroke-width="0.8"/>
  <circle cx="6" cy="20" r="0.8" fill="#e2e8f0"/>
  <circle cx="18" cy="20" r="2" fill="#1e3a5f" stroke="#60a5fa" stroke-width="0.8"/>
  <circle cx="18" cy="20" r="0.8" fill="#e2e8f0"/>
</svg>
