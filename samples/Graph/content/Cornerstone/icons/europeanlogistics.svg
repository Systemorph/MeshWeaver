<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <style>
    .bg { fill: var(--neutral-layer-1, #fafafa); }
    .fg { fill: currentColor; }
    .detail { fill: currentColor; opacity: 0.3; }
    .dk { fill: currentColor; opacity: 0.9; }
  </style>
  <rect class="bg" width="24" height="24" rx="4"/>
  <!-- Truck cabin -->
  <rect class="fg" x="15" y="8" width="7" height="10" rx="1"/>
  <!-- Cabin window -->
  <rect class="detail" x="17" y="10" width="4" height="3" rx="0.5"/>
  <!-- Cargo container -->
  <rect class="fg" x="2" y="6" width="13" height="12" rx="1"/>
  <!-- Wheels -->
  <circle class="dk" cx="6" cy="20" r="2"/>
  <circle class="dk" cx="18" cy="20" r="2"/>
  <circle class="detail" cx="6" cy="20" r="0.8"/>
  <circle class="detail" cx="18" cy="20" r="0.8"/>
</svg>
