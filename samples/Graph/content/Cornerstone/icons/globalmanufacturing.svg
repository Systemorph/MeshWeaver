<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <defs>
    <linearGradient id="factoryGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Factory main building -->
  <rect x="2" y="10" width="20" height="12" rx="1" fill="url(#factoryGradient)"/>
  <!-- Left smokestack -->
  <rect x="4" y="3" width="3" height="7" rx="0.5" fill="url(#factoryGradient)" opacity="0.85"/>
  <!-- Right smokestack -->
  <rect x="10" y="5" width="3" height="5" rx="0.5" fill="url(#factoryGradient)" opacity="0.85"/>
  <!-- Smoke puffs left -->
  <circle cx="5.5" cy="2" r="1.2" fill="#60a5fa" opacity="0.4"/>
  <circle cx="4" cy="1.5" r="0.8" fill="#60a5fa" opacity="0.3"/>
  <!-- Smoke puffs right -->
  <circle cx="11.5" cy="3.5" r="1" fill="#60a5fa" opacity="0.35"/>
  <!-- Windows -->
  <rect x="4" y="12" width="2.5" height="2.5" rx="0.3" fill="#e2e8f0"/>
  <rect x="8" y="12" width="2.5" height="2.5" rx="0.3" fill="#e2e8f0"/>
  <rect x="12" y="12" width="2.5" height="2.5" rx="0.3" fill="#e2e8f0"/>
  <!-- Large door -->
  <rect x="16.5" y="14" width="4" height="8" rx="0.5" fill="#e2e8f0"/>
  <!-- Gear accent -->
  <circle cx="19.5" cy="7" r="3" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
  <circle cx="19.5" cy="7" r="1" fill="#60a5fa"/>
  <!-- Gear teeth -->
  <line x1="19.5" y1="3.5" x2="19.5" y2="4.5" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19.5" y1="9.5" x2="19.5" y2="10.5" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="17" y2="7" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="7" x2="23" y2="7" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
</svg>
