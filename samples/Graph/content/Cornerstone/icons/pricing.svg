    .wh { fill: var(--neutral-layer-1, #ffffff); }
  </style>
  <rect class="bg" width="24" height="24" rx="4"/>
  <!-- Price tag -->
  <path class="fg" d="M10 4 L20 4 L20 20 L10 20 L4 12 Z"/>
