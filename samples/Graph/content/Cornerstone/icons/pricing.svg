  <text class="wh" x="15" y="15" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="8" font-weight="bold" text-anchor="middle">$</text>
</svg>
