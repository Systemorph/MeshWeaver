<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <style>
    .bg { fill: #f5f5f5; }
    .nf { fill: #616161; }
    .detail { fill: #e0e0e0; }
  </style>
  <rect class="bg" width="24" height="24" rx="4"/>
  <!-- Chip body -->
  <rect class="nf" x="6" y="6" width="12" height="12" rx="2"/>
  <!-- Core -->
  <rect class="detail" x="9" y="9" width="6" height="6" rx="1"/>
  <!-- Pins: top -->
  <rect class="nf" x="8.25" y="3" width="1.5" height="3" rx="0.75"/>
  <rect class="nf" x="14.25" y="3" width="1.5" height="3" rx="0.75"/>
  <!-- Pins: bottom -->
  <rect class="nf" x="8.25" y="18" width="1.5" height="3" rx="0.75"/>
  <rect class="nf" x="14.25" y="18" width="1.5" height="3" rx="0.75"/>
  <!-- Pins: left -->
  <rect class="nf" x="3" y="8.25" width="3" height="1.5" rx="0.75"/>
  <rect class="nf" x="3" y="14.25" width="3" height="1.5" rx="0.75"/>
  <!-- Pins: right -->
  <rect class="nf" x="18" y="8.25" width="3" height="1.5" rx="0.75"/>
  <rect class="nf" x="18" y="14.25" width="3" height="1.5" rx="0.75"/>
</svg>
