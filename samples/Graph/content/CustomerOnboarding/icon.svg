<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="briefcase-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="handle-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1E293B"/>
  <!-- Decorative dots -->
  <circle cx="25" cy="35" r="2" fill="#60A5FA"/>
  <circle cx="103" cy="30" r="1.5" fill="#60A5FA"/>
  <circle cx="105" cy="95" r="2" fill="#60A5FA"/>
  <circle cx="22" cy="90" r="1.5" fill="#60A5FA"/>
  <!-- Briefcase handle -->
  <path d="M48 42 L48 35 C48 30 52 26 58 26 L70 26 C76 26 80 30 80 35 L80 42"
        fill="none" stroke="url(#handle-gradient)" stroke-width="5" stroke-linecap="round"/>
  <!-- Briefcase body -->
  <rect x="28" y="42" width="72" height="50" rx="6" fill="url(#briefcase-gradient)"/>
  <!-- Briefcase clasp/detail -->
  <rect x="54" y="60" width="20" height="12" rx="3" fill="#1E293B"/>
  <circle cx="64" cy="66" r="3" fill="#60A5FA"/>
  <!-- Briefcase divider line -->
  <line x1="28" y1="67" x2="54" y2="67" stroke="#1D4ED8" stroke-width="2"/>
  <line x1="74" y1="67" x2="100" y2="67" stroke="#1D4ED8" stroke-width="2"/>
  <!-- Border -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#3B82F6" stroke-width="4"/>
</svg>
