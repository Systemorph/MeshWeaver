<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#FEE2E2"/>
  <!-- Inbox/stack of items -->
  <rect x="12" y="40" width="40" height="16" rx="3" stroke="#78716C" stroke-width="2" fill="none"/>
  <path d="M16 44h24" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16 50h16" stroke="#78716C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Stacked cards behind -->
  <rect x="14" y="32" width="36" height="10" rx="2" stroke="#78716C" stroke-width="1.5" fill="white" opacity="0.8"/>
  <rect x="16" y="24" width="32" height="10" rx="2" stroke="#78716C" stroke-width="1.5" fill="white" opacity="0.6"/>
  <rect x="18" y="16" width="28" height="10" rx="2" stroke="#78716C" stroke-width="1.5" fill="white" opacity="0.4"/>

  <!-- Unassigned indicator -->
  <circle cx="48" cy="44" r="6" fill="#DC2626"/>
  <text x="48" y="47" text-anchor="middle" font-size="8" font-weight="bold" fill="white">?</text>
</svg>
