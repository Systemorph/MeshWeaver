<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="castleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#F3F4F6"/>
  <!-- Castle tower body -->
  <rect x="16" y="20" width="32" height="36" rx="1" fill="url(#castleGrad)"/>
  <!-- Crenellations (battlements) -->
  <rect x="14" y="14" width="8" height="8" rx="1" fill="url(#castleGrad)"/>
  <rect x="28" y="14" width="8" height="8" rx="1" fill="url(#castleGrad)"/>
  <rect x="42" y="14" width="8" height="8" rx="1" fill="url(#castleGrad)"/>
  <!-- Battlement connecting wall -->
  <rect x="14" y="20" width="36" height="4" fill="url(#castleGrad)"/>
  <!-- Brick texture lines -->
  <line x1="16" y1="30" x2="48" y2="30" stroke="#374151" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="38" x2="48" y2="38" stroke="#374151" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="46" x2="48" y2="46" stroke="#374151" stroke-width="0.8" opacity="0.5"/>
  <!-- Vertical brick offsets -->
  <line x1="28" y1="24" x2="28" y2="30" stroke="#374151" stroke-width="0.8" opacity="0.4"/>
  <line x1="38" y1="24" x2="38" y2="30" stroke="#374151" stroke-width="0.8" opacity="0.4"/>
  <line x1="24" y1="30" x2="24" y2="38" stroke="#374151" stroke-width="0.8" opacity="0.4"/>
  <line x1="34" y1="30" x2="34" y2="38" stroke="#374151" stroke-width="0.8" opacity="0.4"/>
  <line x1="42" y1="30" x2="42" y2="38" stroke="#374151" stroke-width="0.8" opacity="0.4"/>
  <line x1="28" y1="38" x2="28" y2="46" stroke="#374151" stroke-width="0.8" opacity="0.4"/>
  <line x1="38" y1="38" x2="38" y2="46" stroke="#374151" stroke-width="0.8" opacity="0.4"/>
  <!-- Gate/door archway -->
  <path d="M27 56 V48 A5 5 0 0 1 37 48 V56" fill="#374151"/>
  <!-- Arrow slit windows -->
  <rect x="20" y="26" width="2" height="6" rx="1" fill="#374151"/>
  <rect x="42" y="26" width="2" height="6" rx="1" fill="#374151"/>
  <!-- Foundation line -->
  <rect x="12" y="54" width="40" height="2" rx="1" fill="#6B7280"/>
</svg>
