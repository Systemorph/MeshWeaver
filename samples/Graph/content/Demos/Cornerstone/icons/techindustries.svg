<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <defs>
    <linearGradient id="techGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="24" height="24" rx="4" fill="#F3F4F6"/>
  <!-- Chip body -->
  <rect x="5" y="5" width="14" height="14" rx="2" fill="url(#techGrad)"/>
  <!-- Inner die -->
  <rect x="8" y="8" width="8" height="8" rx="1" fill="#9CA3AF" opacity="0.4"/>
  <!-- Core circuit -->
  <rect x="10" y="10" width="4" height="4" rx="0.5" fill="#e2e8f0"/>
  <!-- Top pins -->
  <line x1="8" y1="2" x2="8" y2="5" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="2" x2="12" y2="5" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="2" x2="16" y2="5" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bottom pins -->
  <line x1="8" y1="19" x2="8" y2="22" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="19" x2="12" y2="22" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="16" y2="22" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left pins -->
  <line x1="2" y1="8" x2="5" y2="8" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="2" y1="12" x2="5" y2="12" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="5" y2="16" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right pins -->
  <line x1="19" y1="8" x2="22" y2="8" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="12" x2="22" y2="12" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="22" y2="16" stroke="url(#techGrad)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
