<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="shipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#DBEAFE"/>
  <!-- Compass rose behind ship (subtle) -->
  <circle cx="32" cy="30" r="26" stroke="#60A5FA" stroke-width="1" opacity="0.2" fill="none"/>
  <circle cx="32" cy="30" r="18" stroke="#60A5FA" stroke-width="0.8" opacity="0.15" fill="none"/>
  <!-- Cardinal point marks -->
  <line x1="32" y1="4" x2="32" y2="8" stroke="#60A5FA" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="58" y1="30" x2="54" y2="30" stroke="#60A5FA" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="6" y1="30" x2="10" y2="30" stroke="#60A5FA" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Ship hull -->
  <path d="M12 44 Q14 52 32 52 Q50 52 52 44 Z" fill="url(#shipGrad)"/>
  <!-- Ship body -->
  <path d="M16 44 H48 L44 38 H20 Z" fill="#1E40AF" opacity="0.8"/>
  <!-- Mast -->
  <line x1="32" y1="10" x2="32" y2="44" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Main sail (billowing) -->
  <path d="M32 12 Q48 22 32 38" fill="#60A5FA" opacity="0.7" stroke="#1E40AF" stroke-width="1"/>
  <!-- Fore sail (smaller) -->
  <path d="M32 14 Q20 24 32 34" fill="#93C5FD" opacity="0.5" stroke="#1E40AF" stroke-width="0.8"/>
  <!-- Flag at top -->
  <path d="M32 10 L38 13 L32 16" fill="#2563EB"/>
  <!-- Hull detail line -->
  <line x1="18" y1="47" x2="46" y2="47" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <!-- Waves -->
  <path d="M4 54 Q10 50 16 54 Q22 58 28 54 Q34 50 40 54 Q46 58 52 54 Q58 50 60 54" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M6 58 Q12 55 18 58 Q24 61 30 58 Q36 55 42 58 Q48 61 54 58" stroke="#93C5FD" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
