<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 79" fill="none">
  <style>
    .bg { fill: #f0f6ff; }
    .nf { fill: #616161; }
    .af { fill: #1B6EC2; }
  </style>
  <rect class="bg" width="140" height="79" rx="8"/>
  <!-- Chart frame -->
  <rect class="nf" x="9" y="7" width="122" height="64" rx="5"/>
  <rect class="bg" x="11" y="9" width="118" height="60" rx="3"/>
  <!-- Axis -->
  <rect class="nf" x="20" y="56" width="100" height="1" rx="0.5" opacity="0.3"/>
  <!-- Column bars for each LoB -->
  <rect class="af" x="22" y="20" width="10" height="36" rx="1"/>
  <rect class="af" x="38" y="32" width="10" height="24" rx="1" opacity="0.85"/>
  <rect class="af" x="54" y="26" width="10" height="30" rx="1" opacity="0.7"/>
  <rect class="af" x="70" y="38" width="10" height="18" rx="1" opacity="0.55"/>
  <rect class="af" x="86" y="14" width="10" height="42" rx="1" opacity="0.9"/>
  <rect class="af" x="102" y="30" width="10" height="26" rx="1" opacity="0.65"/>
  <!-- 100% reference line -->
  <line x1="20" y1="28" x2="120" y2="28" stroke="#616161" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.4"/>
</svg>
