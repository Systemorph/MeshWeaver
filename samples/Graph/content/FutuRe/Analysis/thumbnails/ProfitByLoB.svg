<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 79" fill="none">
  <style>
    .bg { fill: #f0f6ff; }
    .nf { fill: #616161; }
    .af { fill: #1B6EC2; }
  </style>
  <rect class="bg" width="140" height="79" rx="8"/>
  <!-- Chart frame -->
  <rect class="nf" x="9" y="7" width="122" height="64" rx="5"/>
  <rect class="bg" x="11" y="9" width="118" height="60" rx="3"/>
  <!-- Labels -->
  <rect class="nf" x="14" y="15" width="20" height="2" rx="1" opacity="0.5"/>
  <rect class="nf" x="14" y="25" width="16" height="2" rx="1" opacity="0.5"/>
  <rect class="nf" x="14" y="35" width="22" height="2" rx="1" opacity="0.5"/>
  <rect class="nf" x="14" y="45" width="14" height="2" rx="1" opacity="0.5"/>
  <rect class="nf" x="14" y="55" width="18" height="2" rx="1" opacity="0.5"/>
  <!-- Horizontal bars -->
  <rect class="af" x="40" y="12" width="70" height="6" rx="2"/>
  <rect class="af" x="40" y="22" width="55" height="6" rx="2" opacity="0.85"/>
  <rect class="af" x="40" y="32" width="80" height="6" rx="2" opacity="0.7"/>
  <rect class="af" x="40" y="42" width="40" height="6" rx="2" opacity="0.55"/>
  <rect class="af" x="40" y="52" width="62" height="6" rx="2" opacity="0.4"/>
  <!-- Vertical axis -->
  <rect class="nf" x="38" y="10" width="1" height="52" rx="0.5" opacity="0.3"/>
</svg>
