<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 79" fill="none">
  <style>
    .bg { fill: #f0f6ff; }
    .nf { fill: #616161; }
    .af { fill: #1B6EC2; }
  </style>
  <rect class="bg" width="140" height="79" rx="8"/>
  <!-- Chart frame -->
  <rect class="nf" x="9" y="7" width="122" height="64" rx="5"/>
  <rect class="bg" x="11" y="9" width="118" height="60" rx="3"/>
  <!-- Axis line -->
  <rect class="nf" x="20" y="56" width="100" height="1" rx="0.5" opacity="0.3"/>
  <!-- Stacked bars (positive: blue, negative: lighter blue) -->
  <rect class="af" x="24" y="30" width="8" height="26" rx="1"/>
  <rect class="af" x="24" y="44" width="8" height="12" rx="1" opacity="0.3"/>
  <rect class="af" x="38" y="26" width="8" height="30" rx="1"/>
  <rect class="af" x="38" y="40" width="8" height="16" rx="1" opacity="0.3"/>
  <rect class="af" x="52" y="22" width="8" height="34" rx="1"/>
  <rect class="af" x="52" y="38" width="8" height="18" rx="1" opacity="0.3"/>
  <rect class="af" x="66" y="28" width="8" height="28" rx="1"/>
  <rect class="af" x="66" y="42" width="8" height="14" rx="1" opacity="0.3"/>
  <rect class="af" x="80" y="18" width="8" height="38" rx="1"/>
  <rect class="af" x="80" y="36" width="8" height="20" rx="1" opacity="0.3"/>
  <rect class="af" x="94" y="24" width="8" height="32" rx="1"/>
  <rect class="af" x="94" y="38" width="8" height="18" rx="1" opacity="0.3"/>
  <!-- Profit line overlay -->
  <polyline points="28,24 42,20 56,16 70,22 84,12 98,18" stroke="#1B6EC2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <circle class="af" cx="28" cy="24" r="2" opacity="0.7"/>
  <circle class="af" cx="42" cy="20" r="2" opacity="0.7"/>
  <circle class="af" cx="56" cy="16" r="2" opacity="0.7"/>
  <circle class="af" cx="70" cy="22" r="2" opacity="0.7"/>
  <circle class="af" cx="84" cy="12" r="2" opacity="0.7"/>
  <circle class="af" cx="98" cy="18" r="2" opacity="0.7"/>
</svg>
