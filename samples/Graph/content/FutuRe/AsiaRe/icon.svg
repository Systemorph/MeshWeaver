  <!-- Windows row 1 -->
  <rect x="7" y="9" width="3" height="3" rx="0.5" fill="#1B6EC2" opacity="0.3"/>
  <rect x="14" y="9" width="3" height="3" rx="0.5" fill="#1B6EC2" opacity="0.3"/>
  <!-- Windows row 2 -->
  <rect x="7" y="14" width="3" height="3" rx="0.5" fill="#1B6EC2" opacity="0.3"/>
  <rect x="14" y="14" width="3" height="3" rx="0.5" fill="#1B6EC2" opacity="0.3"/>
  <!-- Door -->
