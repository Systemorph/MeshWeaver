<svg viewBox="0 0 800 420" width="800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #fafafa; }
    .title { fill: #1a237e; }
    .hub-box { fill: #e3f2fd; stroke: #1976d2; }
    .hub-label { fill: #1565c0; }
    .hub-item { fill: #1976d2; }
    .mesh-box { fill: #e8f5e9; stroke: #388e3c; }
    .mesh-label { fill: #2e7d32; }
    .mesh-text { fill: #388e3c; }
    .ai-box { fill: #fff3e0; stroke: #f57c00; }
    .ai-label { fill: #e65100; }
    .ai-text { fill: #f57c00; }
    .data-box { fill: #f3e5f5; stroke: #7b1fa2; }
    .data-label { fill: #6a1b9a; }
    .data-text { fill: #7b1fa2; }
    .security-box { fill: #ffebee; stroke: #c62828; }
    .security-label { fill: #c62828; }
    .security-text { fill: #e53935; }
    .ui-box { fill: #9c27b0; }
    .muted { fill: #666; }

    [data-theme="dark"] .bg { fill: #1e1e2e; }
    [data-theme="dark"] .title { fill: #89b4fa; }
    [data-theme="dark"] .hub-box { fill: #1e3a5f; stroke: #89b4fa; }
    [data-theme="dark"] .hub-label { fill: #89b4fa; }
    [data-theme="dark"] .hub-item { fill: #3b82f6; }
    [data-theme="dark"] .mesh-box { fill: #1a3d2e; stroke: #a6e3a1; }
    [data-theme="dark"] .mesh-label { fill: #a6e3a1; }
    [data-theme="dark"] .mesh-text { fill: #94e2a5; }
    [data-theme="dark"] .ai-box { fill: #3d2e1a; stroke: #fab387; }
    [data-theme="dark"] .ai-label { fill: #fab387; }
    [data-theme="dark"] .ai-text { fill: #f9c97c; }
    [data-theme="dark"] .data-box { fill: #2d1f3d; stroke: #cba6f7; }
    [data-theme="dark"] .data-label { fill: #cba6f7; }
    [data-theme="dark"] .data-text { fill: #ddb6f2; }
    [data-theme="dark"] .security-box { fill: #3d1f1f; stroke: #f38ba8; }
    [data-theme="dark"] .security-label { fill: #f38ba8; }
    [data-theme="dark"] .security-text { fill: #eba0ac; }
    [data-theme="dark"] .ui-box { fill: #b4befe; }
    [data-theme="dark"] .ui-text { fill: #1e1e2e; }
    [data-theme="dark"] .muted { fill: #a6adc8; }
  </style>
  <rect class="bg" width="800" height="420"/>
  <text class="title" x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold">MeshWeaver Platform</text>

  <!-- Message Hubs Layer -->
  <rect class="hub-box" x="50" y="60" width="700" height="80" rx="8" stroke-width="2"/>
  <text class="hub-label" x="400" y="85" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Message Hubs</text>
  <rect class="hub-item" x="70" y="100" width="90" height="30" rx="4"/>
  <text x="115" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Data Hub</text>
  <rect class="hub-item" x="170" y="100" width="90" height="30" rx="4"/>
  <text x="215" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Layout Hub</text>
  <rect class="hub-item" x="270" y="100" width="90" height="30" rx="4"/>
  <text x="315" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="white">AI Hub</text>
  <rect class="hub-item" x="370" y="100" width="90" height="30" rx="4"/>
  <text x="415" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Workflow</text>
  <rect class="hub-item" x="470" y="100" width="110" height="30" rx="4"/>
  <text x="525" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Business Logic</text>
  <rect class="hub-item" x="590" y="100" width="80" height="30" rx="4"/>
  <text x="630" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Reports</text>

  <!-- Mesh Graph Layer -->
  <rect class="mesh-box" x="50" y="160" width="340" height="90" rx="8" stroke-width="2"/>
  <text class="mesh-label" x="220" y="182" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Mesh Graph</text>
  <text class="mesh-text" x="220" y="202" text-anchor="middle" font-family="Arial" font-size="10">Make every object addressable (data, docs, images)</text>
  <text class="mesh-text" x="220" y="218" text-anchor="middle" font-family="Arial" font-size="10">Arrange in hierarchical namespaces</text>
  <text class="muted" x="220" y="238" text-anchor="middle" font-family="Arial" font-size="9">Route messages among servers and clouds</text>

  <!-- AI Agents Layer -->
  <rect class="ai-box" x="410" y="160" width="340" height="90" rx="8" stroke-width="2"/>
  <text class="ai-label" x="580" y="182" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">AI Agents</text>
  <text class="ai-text" x="580" y="202" text-anchor="middle" font-family="Arial" font-size="10">Custom agents with custom commands</text>
  <text class="ai-text" x="580" y="218" text-anchor="middle" font-family="Arial" font-size="10">Agent selection in mesh hierarchy</text>
  <text class="muted" x="580" y="238" text-anchor="middle" font-family="Arial" font-size="9">Multi-agent collaboration</text>

  <!-- Data Sources Layer -->
  <rect class="data-box" x="50" y="270" width="340" height="80" rx="8" stroke-width="2"/>
  <text class="data-label" x="220" y="295" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Data Sources</text>
  <text class="data-text" x="80" y="322" text-anchor="middle" font-family="Arial" font-size="9">Snowflake</text>
  <text class="data-text" x="140" y="322" text-anchor="middle" font-family="Arial" font-size="9">SQL Server</text>
  <text class="data-text" x="200" y="322" text-anchor="middle" font-family="Arial" font-size="9">Cosmos DB</text>
  <text class="data-text" x="260" y="322" text-anchor="middle" font-family="Arial" font-size="9">Databricks</text>
  <text class="data-text" x="330" y="322" text-anchor="middle" font-family="Arial" font-size="9">REST / APIs</text>
  <text class="muted" x="220" y="340" text-anchor="middle" font-family="Arial" font-size="8">+ Blob Storage, SharePoint, and more</text>

  <!-- Security Layer -->
  <rect class="security-box" x="410" y="270" width="340" height="80" rx="8" stroke-width="2"/>
  <text class="security-label" x="580" y="295" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Security</text>
  <text class="security-text" x="580" y="315" text-anchor="middle" font-family="Arial" font-size="10">Dimension-based or hierarchical permissions</text>
  <text class="muted" x="580" y="335" text-anchor="middle" font-family="Arial" font-size="9">Implement any rule set with IDataValidator</text>

  <!-- User Interface -->
  <rect class="ui-box" x="50" y="370" width="700" height="35" rx="4"/>
  <text class="ui-text" x="400" y="393" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">User Interface: Controls Language + JSON Streaming + Two-Way Binding</text>
</svg>
