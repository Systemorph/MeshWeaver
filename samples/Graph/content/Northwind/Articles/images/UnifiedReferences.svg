<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    .diagram-bg { fill: var(--neutral-layer-1, #fafafa); }
    .conn-line { fill: var(--neutral-stroke-rest, #d1d1d1); }
    .center-node { fill: var(--accent-fill-rest, #0f6cbd); }
    .center-text { fill: var(--neutral-foreground-on-accent, #ffffff); }
    .area-node { fill: var(--accent-fill-rest, #0f6cbd); }
    .area-text { fill: var(--neutral-foreground-on-accent, #ffffff); }
    .content-node { fill: var(--error-fill-rest, #d13438); }
    .content-text { fill: var(--neutral-foreground-on-accent, #ffffff); }
    .data-node { fill: var(--info-fill-rest, #5c2d91); }
    .data-text { fill: var(--neutral-foreground-on-accent, #ffffff); }
    .title-text { fill: currentColor; }
  </style>

  <!-- Background -->
  <rect class="diagram-bg" width="400" height="300"/>

  <!-- Connection lines (filled polygons replacing stroked lines) -->
  <!-- Line from (200,150) to (70,80): dir (-130,-70)/147.65, perp (0.474,-0.880), offset 1 -->
  <polygon class="conn-line" points="200.5,149.1 70.5,79.1 69.5,80.9 199.5,150.9" opacity="0.6"/>
  <!-- Line from (200,150) to (330,80): dir (130,-70)/147.65, perp (0.474,0.880), offset 1 -->
  <polygon class="conn-line" points="199.5,149.1 329.5,79.1 330.5,80.9 200.5,150.9" opacity="0.6"/>
  <!-- Line from (200,150) to (200,250): vertical, simple rect -->
  <rect class="conn-line" x="199" y="150" width="2" height="100" opacity="0.6"/>

  <!-- Center node - @ symbol -->
  <circle class="center-node" cx="200" cy="150" r="35" opacity="0.9"/>
  <text class="center-text" x="200" y="160" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="32" font-weight="bold" text-anchor="middle">@</text>

  <!-- Data node (bottom) -->
  <rect class="data-node" x="160" y="220" width="80" height="50" rx="8" opacity="0.9"/>
  <text class="data-text" x="200" y="240" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="11" text-anchor="middle">data:</text>
  <text class="data-text" x="200" y="255" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="9" text-anchor="middle" opacity="0.8">{ JSON }</text>

  <!-- Content node (top right) -->
  <rect class="content-node" x="290" y="50" width="80" height="50" rx="8" opacity="0.9"/>
  <text class="content-text" x="330" y="70" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="11" text-anchor="middle">content:</text>
  <text class="content-text" x="330" y="85" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="9" text-anchor="middle" opacity="0.8">files</text>

  <!-- Area node (top left) -->
  <rect class="area-node" x="30" y="50" width="80" height="50" rx="8" opacity="0.9"/>
  <text class="area-text" x="70" y="70" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="11" text-anchor="middle">area:</text>
  <text class="area-text" x="70" y="85" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="9" text-anchor="middle" opacity="0.8">layouts</text>

  <!-- Title -->
  <text class="title-text" x="200" y="25" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Unified Content References</text>
</svg>
