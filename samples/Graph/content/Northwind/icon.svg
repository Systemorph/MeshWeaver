<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <style>
    .bg { fill: #ebf3fc; }
    .chev-grey { fill: #616161; }
    .chev-blue { fill: #0f6cbd; }
    .chev-red { fill: #c50f1f; }
    .title { fill: #0e4775; }
    .subtitle { fill: #0f6cbd; }
  </style>
  <rect class="bg" width="64" height="64" rx="8"/>
  <g transform="translate(32, 23)">
    <!-- Grey chevron (stroke-width 2.5 -> filled polygon) -->
    <polygon class="chev-grey" points="-12.6,-11.9 0,-5.6 12.6,-11.9 12.6,-14.1 0,-8.4 -12.6,-14.1" opacity="0.3"/>
    <!-- Blue chevron (stroke-width 3 -> filled polygon, thicker) -->
    <polygon class="chev-blue" points="-12.7,-4.5 0,1.5 12.7,-4.5 12.7,-7.5 0,-1.5 -12.7,-7.5"/>
    <!-- Red chevron (stroke-width 2.5 -> filled polygon) -->
    <polygon class="chev-red" points="-12.6,2.1 0,8.4 12.6,2.1 12.6,-0.1 0,5.6 -12.6,-0.1" opacity="0.3"/>
  </g>
  <text class="title" x="32" y="48" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="3">ACME</text>
  <text class="subtitle" x="32" y="57" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif" font-size="5" text-anchor="middle" letter-spacing="2">NORTHWIND</text>
</svg>
