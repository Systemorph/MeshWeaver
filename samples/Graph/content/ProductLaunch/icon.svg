<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="rocket-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="flame-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1E293B"/>
  <!-- Stars -->
  <circle cx="20" cy="30" r="2" fill="#FCD34D"/>
  <circle cx="100" cy="25" r="1.5" fill="#FCD34D"/>
  <circle cx="110" cy="55" r="2" fill="#FCD34D"/>
  <circle cx="25" cy="90" r="1.5" fill="#FCD34D"/>
  <circle cx="95" cy="100" r="2" fill="#FCD34D"/>
  <!-- Rocket body -->
  <path d="M64 20 C50 35, 45 60, 50 85 L64 80 L78 85 C83 60, 78 35, 64 20Z" fill="url(#rocket-gradient)"/>
  <!-- Rocket window -->
  <circle cx="64" cy="45" r="10" fill="#0EA5E9"/>
  <circle cx="64" cy="45" r="7" fill="#38BDF8"/>
  <circle cx="61" cy="42" r="2" fill="white" opacity="0.6"/>
  <!-- Rocket fins -->
  <path d="M50 75 L35 95 L50 85Z" fill="#DC2626"/>
  <path d="M78 75 L93 95 L78 85Z" fill="#DC2626"/>
  <!-- Flame -->
  <path d="M55 85 Q64 110 73 85 Q68 95 64 105 Q60 95 55 85Z" fill="url(#flame-gradient)"/>
  <!-- Border -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#F97316" stroke-width="4"/>
</svg>
