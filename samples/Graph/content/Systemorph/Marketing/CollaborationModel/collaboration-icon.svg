<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="48" height="48" rx="8" fill="var(--accent-fill-rest, #5a67d8)"/>
  <!-- Two people/seats representing partnership -->
  <!-- Left person (Systemorph - at steering wheel initially) -->
  <circle cx="16" cy="18" r="5" fill="currentColor"/>
  <path d="M10 32 Q10 26 16 26 Q22 26 22 32" fill="currentColor"/>
  <!-- Right person (Client) -->
  <circle cx="32" cy="18" r="5" fill="currentColor" opacity="0.7"/>
  <path d="M26 32 Q26 26 32 26 Q38 26 38 32" fill="currentColor" opacity="0.7"/>
  <!-- Handshake/connection in the middle -->
  <path d="M20 28 L28 28" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow indicating knowledge transfer -->
  <path d="M21 38 L27 38 L25 36 M27 38 L25 40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
