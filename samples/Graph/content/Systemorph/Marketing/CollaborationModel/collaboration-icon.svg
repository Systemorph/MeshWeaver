<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="collab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#5a67d8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="8" fill="url(#collab)"/>
  <!-- Two people/seats representing partnership -->
  <!-- Left person (Systemorph - at steering wheel initially) -->
  <circle cx="16" cy="18" r="5" fill="white"/>
  <path d="M10 32 Q10 26 16 26 Q22 26 22 32" fill="white"/>
  <!-- Right person (Client) -->
  <circle cx="32" cy="18" r="5" fill="#c6f6d5"/>
  <path d="M26 32 Q26 26 32 26 Q38 26 38 32" fill="#c6f6d5"/>
  <!-- Handshake/connection in the middle -->
  <path d="M20 28 L28 28" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow indicating knowledge transfer -->
  <path d="M21 38 L27 38 L25 36 M27 38 L25 40" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
