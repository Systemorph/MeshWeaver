<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <style>
    .bg { fill: var(--neutral-layer-1, #f7fafc); }
    .title { fill: currentColor; }
    .road { fill: var(--neutral-fill-strong, #2d3748); }
    .road-line { stroke: var(--neutral-stroke-rest, #edf2f7); }
    .car-body { fill: var(--accent-fill-rest, #5a67d8); }
    .window-blue { fill: var(--accent-fill-rest, #bee3f8); opacity: 0.5; }
    .window-green { fill: var(--success-fill-rest, #c6f6d5); opacity: 0.5; }
    .wheel-outer { fill: var(--neutral-foreground-rest, #1a202c); }
    .wheel-inner { fill: var(--neutral-foreground-hint, #718096); }
    .steering { stroke: currentColor; fill: none; }
    .sys-head { fill: var(--info-fill-rest, #9f7aea); }
    .sys-label { fill: var(--info-fill-rest, #805ad5); }
    .client-head { fill: var(--success-fill-rest, #48bb78); }
    .client-label { fill: var(--success-fill-rest, #2f855a); }
    .arrow { fill: var(--success-fill-rest, #48bb78); }
    .arrow-text { fill: var(--success-fill-rest, #2f855a); }
    .phase1-title { fill: var(--accent-fill-rest, #5a67d8); }
    .phase2-title { fill: var(--success-fill-rest, #38a169); }
    .phase-text { fill: var(--neutral-foreground-hint, #718096); }
    .legend-text { fill: var(--neutral-foreground-rest, #4a5568); }
  </style>

  <!-- Background -->
  <rect class="bg" width="800" height="320"/>

  <!-- Title -->
  <text class="title" x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Partnership Evolution</text>

  <!-- Phase 1: Systemorph Drives -->
  <g transform="translate(60, 70)">
    <!-- Road -->
    <rect class="road" x="0" y="140" width="260" height="50" rx="5"/>
    <line class="road-line" x1="20" y1="165" x2="50" y2="165" stroke-width="3" stroke-dasharray="15,10"/>
    <line class="road-line" x1="70" y1="165" x2="100" y2="165" stroke-width="3" stroke-dasharray="15,10"/>
    <line class="road-line" x1="120" y1="165" x2="150" y2="165" stroke-width="3" stroke-dasharray="15,10"/>
    <line class="road-line" x1="170" y1="165" x2="200" y2="165" stroke-width="3" stroke-dasharray="15,10"/>
    <line class="road-line" x1="220" y1="165" x2="250" y2="165" stroke-width="3" stroke-dasharray="15,10"/>

    <!-- Car Body -->
    <rect class="car-body" x="60" y="95" width="140" height="55" rx="10"/>
    <rect class="car-body" x="75" y="70" width="110" height="35" rx="8"/>

    <!-- Windows -->
    <rect class="window-blue" x="82" y="75" width="45" height="25" rx="4"/>
    <rect class="window-blue" x="133" y="75" width="45" height="25" rx="4"/>

    <!-- Wheels -->
    <circle class="wheel-outer" cx="95" cy="150" r="18"/>
    <circle class="wheel-inner" cx="95" cy="150" r="8"/>
    <circle class="wheel-outer" cx="165" cy="150" r="18"/>
    <circle class="wheel-inner" cx="165" cy="150" r="8"/>

    <!-- Driver (Systemorph - purple) -->
    <circle class="sys-head" cx="100" cy="82" r="10"/>
    <text class="sys-label" x="100" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600">SYS</text>

    <!-- Passenger (Client - green) -->
    <circle class="client-head" cx="155" cy="82" r="10"/>
    <text class="client-label" x="155" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600">CLIENT</text>

    <!-- Steering wheel indicator -->
    <circle class="steering" cx="100" cy="115" r="12" stroke-width="2"/>
    <line class="steering" x1="100" y1="103" x2="100" y2="127" stroke-width="2"/>
    <line class="steering" x1="88" y1="115" x2="112" y2="115" stroke-width="2"/>

    <!-- Label -->
    <text class="phase1-title" x="130" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Phase 1: Getting Started</text>
    <text class="phase-text" x="130" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12">Systemorph drives,</text>
    <text class="phase-text" x="130" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12">Client learns the road</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(345, 150)">
    <path class="arrow" d="M0,20 L80,20 L80,5 L110,30 L80,55 L80,40 L0,40 Z"/>
    <text class="arrow-text" x="55" y="75" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Knowledge</text>
    <text class="arrow-text" x="55" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Transfer</text>
  </g>

  <!-- Phase 2: Client Drives -->
  <g transform="translate(480, 70)">
    <!-- Road -->
    <rect class="road" x="0" y="140" width="260" height="50" rx="5"/>
    <line class="road-line" x1="20" y1="165" x2="50" y2="165" stroke-width="3" stroke-dasharray="15,10"/>
    <line class="road-line" x1="70" y1="165" x2="100" y2="165" stroke-width="3" stroke-dasharray="15,10"/>
    <line class="road-line" x1="120" y1="165" x2="150" y2="165" stroke-width="3" stroke-dasharray="15,10"/>
    <line class="road-line" x1="170" y1="165" x2="200" y2="165" stroke-width="3" stroke-dasharray="15,10"/>
    <line class="road-line" x1="220" y1="165" x2="250" y2="165" stroke-width="3" stroke-dasharray="15,10"/>

    <!-- Car Body -->
    <rect class="car-body" x="60" y="95" width="140" height="55" rx="10"/>
    <rect class="car-body" x="75" y="70" width="110" height="35" rx="8"/>

    <!-- Windows - green tint for client ownership -->
    <rect class="window-green" x="82" y="75" width="45" height="25" rx="4"/>
    <rect class="window-green" x="133" y="75" width="45" height="25" rx="4"/>

    <!-- Wheels -->
    <circle class="wheel-outer" cx="95" cy="150" r="18"/>
    <circle class="wheel-inner" cx="95" cy="150" r="8"/>
    <circle class="wheel-outer" cx="165" cy="150" r="18"/>
    <circle class="wheel-inner" cx="165" cy="150" r="8"/>

    <!-- Driver (Client - green, now driving!) -->
    <circle class="client-head" cx="100" cy="82" r="10"/>
    <text class="client-label" x="100" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600">CLIENT</text>

    <!-- Passenger (Systemorph - purple, now advising) -->
    <circle class="sys-head" cx="155" cy="82" r="10"/>
    <text class="sys-label" x="155" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600">SYS</text>

    <!-- Steering wheel indicator -->
    <circle class="steering" cx="100" cy="115" r="12" stroke-width="2"/>
    <line class="steering" x1="100" y1="103" x2="100" y2="127" stroke-width="2"/>
    <line class="steering" x1="88" y1="115" x2="112" y2="115" stroke-width="2"/>

    <!-- Label -->
    <text class="phase2-title" x="130" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Phase 2: Client Ownership</text>
    <text class="phase-text" x="130" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12">Client drives,</text>
    <text class="phase-text" x="130" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12">Systemorph navigates</text>
  </g>

  <!-- Legend -->
  <g transform="translate(300, 285)">
    <circle class="sys-head" cx="0" cy="8" r="6"/>
    <text class="legend-text" x="12" y="12" font-family="Segoe UI, Arial, sans-serif" font-size="11">Systemorph</text>
    <circle class="client-head" cx="100" cy="8" r="6"/>
    <text class="legend-text" x="112" y="12" font-family="Segoe UI, Arial, sans-serif" font-size="11">Client</text>
  </g>
</svg>
