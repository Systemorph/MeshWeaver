<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <pattern id="carol-pattern" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#DC2626"/>
      <circle cx="10" cy="10" r="8" fill="none" stroke="#FCA5A5" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#FCA5A5"/>
      <circle cx="20" cy="0" r="4" fill="#FCA5A5"/>
      <circle cx="0" cy="20" r="4" fill="#FCA5A5"/>
      <circle cx="20" cy="20" r="4" fill="#FCA5A5"/>
    </pattern>
    <clipPath id="carol-clip">
      <circle cx="64" cy="64" r="60"/>
    </clipPath>
  </defs>
  <circle cx="64" cy="64" r="60" fill="url(#carol-pattern)"/>
  <g clip-path="url(#carol-clip)">
    <!-- Head -->
    <circle cx="64" cy="42" r="20" fill="#FCD5CE"/>
    <!-- Hair (long curly) -->
    <ellipse cx="64" cy="30" rx="24" ry="12" fill="#92400E"/>
    <ellipse cx="44" cy="45" rx="8" ry="18" fill="#92400E"/>
    <ellipse cx="84" cy="45" rx="8" ry="18" fill="#92400E"/>
    <ellipse cx="46" cy="58" rx="6" ry="10" fill="#92400E"/>
    <ellipse cx="82" cy="58" rx="6" ry="10" fill="#92400E"/>
    <!-- Face -->
    <circle cx="64" cy="44" r="17" fill="#FCD5CE"/>
    <!-- Eyes -->
    <ellipse cx="57" cy="42" rx="2.5" ry="3" fill="#1F2937"/>
    <ellipse cx="71" cy="42" rx="2.5" ry="3" fill="#1F2937"/>
    <!-- Eyelashes -->
    <path d="M54 39 L55 37" stroke="#1F2937" stroke-width="1"/>
    <path d="M57 38 L57 36" stroke="#1F2937" stroke-width="1"/>
    <path d="M60 39 L59 37" stroke="#1F2937" stroke-width="1"/>
    <path d="M68 39 L69 37" stroke="#1F2937" stroke-width="1"/>
    <path d="M71 38 L71 36" stroke="#1F2937" stroke-width="1"/>
    <path d="M74 39 L73 37" stroke="#1F2937" stroke-width="1"/>
    <!-- Smile with lipstick -->
    <path d="M58 51 Q64 56 70 51" stroke="#E11D48" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Body/Shoulders (dress style) -->
    <ellipse cx="64" cy="95" rx="32" ry="28" fill="#FECACA"/>
    <!-- Neckline -->
    <path d="M48 78 Q64 88 80 78" stroke="#DC2626" stroke-width="2" fill="none"/>
  </g>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#DC2626" stroke-width="4"/>
</svg>
