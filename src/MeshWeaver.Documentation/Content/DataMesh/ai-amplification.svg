<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <style>
    .node-bg { rx: 16; }
    .person-bg { fill: #5c6bc0; }
    .agent-bg { fill: #7e57c2; }
    .output-bg { fill: #26a69a; }
    .node-label { fill: #fff; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .node-sub { fill: #fff; opacity: 0.8; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; text-anchor: middle; }
    .arrow { stroke: currentColor; opacity: 0.3; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .node-icon { font-size: 24px; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="currentColor" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Person -->
  <rect class="node-bg person-bg" x="20" y="100" width="120" height="80" rx="40"/>
  <text class="node-icon" x="80" y="132" text-anchor="middle">👤</text>
  <text class="node-label" x="80" y="158">One Person</text>

  <!-- Arrows from person to agents -->
  <line class="arrow" x1="140" y1="120" x2="220" y2="50"/>
  <line class="arrow" x1="140" y1="133" x2="220" y2="120"/>
  <line class="arrow" x1="140" y1="147" x2="220" y2="170"/>
  <line class="arrow" x1="140" y1="160" x2="220" y2="240"/>

  <!-- Agent 1 -->
  <rect class="node-bg agent-bg" x="220" y="20" width="150" height="56" rx="12"/>
  <text class="node-icon" x="250" y="54" text-anchor="middle">🔍</text>
  <text class="node-label" x="310" y="48">Research Agent</text>
  <text class="node-sub" x="310" y="64"></text>

  <!-- Agent 2 -->
  <rect class="node-bg agent-bg" x="220" y="96" width="150" height="56" rx="12"/>
  <text class="node-icon" x="250" y="130" text-anchor="middle">📊</text>
  <text class="node-label" x="310" y="124">Analysis Agent</text>

  <!-- Agent 3 -->
  <rect class="node-bg agent-bg" x="220" y="172" width="150" height="56" rx="12"/>
  <text class="node-icon" x="250" y="206" text-anchor="middle">📝</text>
  <text class="node-label" x="310" y="200">Reporting Agent</text>

  <!-- Agent 4 -->
  <rect class="node-bg agent-bg" x="220" y="248" width="150" height="56" rx="12"/>
  <text class="node-icon" x="250" y="282" text-anchor="middle">⚡</text>
  <text class="node-label" x="310" y="276">Execution Agent</text>

  <!-- Arrows to outputs -->
  <line class="arrow" x1="370" y1="48" x2="460" y2="48"/>
  <line class="arrow" x1="370" y1="124" x2="460" y2="124"/>
  <line class="arrow" x1="370" y1="200" x2="460" y2="200"/>
  <line class="arrow" x1="370" y1="276" x2="460" y2="276"/>

  <!-- Outputs -->
  <rect class="node-bg output-bg" x="460" y="20" width="150" height="56" rx="12"/>
  <text class="node-label" x="535" y="48">Market scans</text>

  <rect class="node-bg output-bg" x="460" y="96" width="150" height="56" rx="12"/>
  <text class="node-label" x="535" y="124">Risk models</text>

  <rect class="node-bg output-bg" x="460" y="172" width="150" height="56" rx="12"/>
  <text class="node-label" x="535" y="200">Board decks</text>

  <rect class="node-bg output-bg" x="460" y="248" width="150" height="56" rx="12"/>
  <text class="node-label" x="535" y="276">System updates</text>

  <!-- Explosion indicator -->
  <text style="font-size: 40px; opacity: 0.15;" x="680" y="170" text-anchor="middle">💥</text>
  <text style="fill: currentColor; opacity: 0.35; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; text-anchor: middle;" x="680" y="200">exponential</text>
  <text style="fill: currentColor; opacity: 0.35; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; text-anchor: middle;" x="680" y="216">output</text>
</svg>
