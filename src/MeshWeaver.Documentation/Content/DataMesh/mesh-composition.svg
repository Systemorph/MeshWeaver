<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <style>
    .product-box { fill: #2e7d32; rx: 12; }
    .combined-box { fill: #1565c0; rx: 12; }
    .agent-box { fill: #7e57c2; rx: 12; }
    .box-label { fill: #fff; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .box-sub { fill: #fff; opacity: 0.75; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 10px; text-anchor: middle; }
    .box-icon { font-size: 20px; }
    .flow-arrow { stroke: currentColor; opacity: 0.25; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead2); }
    .flow-label { fill: currentColor; opacity: 0.4; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 10px; font-style: italic; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="currentColor" opacity="0.25"/>
    </marker>
  </defs>

  <!-- Data Products (left column) -->
  <rect class="product-box" x="30" y="20" width="170" height="56" rx="12"/>
  <text class="box-icon" x="60" y="52" text-anchor="middle">📄</text>
  <text class="box-label" x="130" y="44">Contracts</text>
  <text class="box-sub" x="130" y="60">@insurance/contracts</text>

  <rect class="product-box" x="30" y="96" width="170" height="56" rx="12"/>
  <text class="box-icon" x="60" y="128" text-anchor="middle">💼</text>
  <text class="box-label" x="130" y="120">Portfolios</text>
  <text class="box-sub" x="130" y="136">@finance/portfolios</text>

  <rect class="product-box" x="30" y="172" width="170" height="56" rx="12"/>
  <text class="box-icon" x="60" y="204" text-anchor="middle">⚡</text>
  <text class="box-label" x="130" y="196">Exposures</text>
  <text class="box-sub" x="130" y="212">@risk/exposures</text>

  <rect class="product-box" x="30" y="248" width="170" height="56" rx="12"/>
  <text class="box-icon" x="60" y="280" text-anchor="middle">📊</text>
  <text class="box-label" x="130" y="272">Market Data</text>
  <text class="box-sub" x="130" y="288">@research/markets</text>

  <!-- Arrows to combined view -->
  <line class="flow-arrow" x1="200" y1="48" x2="310" y2="140"/>
  <line class="flow-arrow" x1="200" y1="124" x2="310" y2="148"/>
  <line class="flow-arrow" x1="200" y1="200" x2="310" y2="162"/>
  <line class="flow-arrow" x1="200" y1="276" x2="310" y2="170"/>

  <!-- Combined View -->
  <rect class="combined-box" x="310" y="114" width="190" height="76" rx="12"/>
  <text class="box-icon" x="345" y="152" text-anchor="middle">🔗</text>
  <text class="box-label" x="420" y="148">Combined View</text>
  <text class="box-sub" x="420" y="168">@analysis/q4-review</text>

  <!-- Arrow to agent -->
  <line class="flow-arrow" x1="500" y1="152" x2="570" y2="152"/>

  <!-- AI Agent -->
  <rect class="agent-box" x="570" y="122" width="100" height="64" rx="12"/>
  <text class="box-icon" x="620" y="150" text-anchor="middle">🤖</text>
  <text class="box-label" x="620" y="172">AI Agent</text>

  <!-- Arrow to output -->
  <line class="flow-arrow" x1="670" y1="152" x2="710" y2="152"/>
  <text class="flow-label" x="690" y="142">Insight</text>

  <!-- Executive Summary -->
  <rect class="combined-box" x="710" y="114" width="80" height="76" rx="12"/>
  <text class="box-icon" x="750" y="148" text-anchor="middle">📋</text>
  <text class="box-label" x="750" y="170">Summary</text>
</svg>
