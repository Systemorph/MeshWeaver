<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="var(--accent-fill-rest, #0078d4)" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="var(--neutral-layer-1, #0f172a)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Central human figure (larger for 16:9) -->
  <g transform="translate(960, 540)">
    <!-- Human head -->
    <circle cx="0" cy="-90" r="45" fill="var(--warning-fill-rest, #fbbf24)" filter="url(#strongGlow)"/>
    <!-- Human body -->
    <rect x="-27" y="-45" width="54" height="90" rx="14" fill="var(--warning-fill-rest, #fbbf24)" filter="url(#glow)"/>
    <!-- Human arms -->
    <rect x="-72" y="-35" width="45" height="20" rx="10" fill="var(--warning-fill-rest, #fbbf24)" transform="rotate(-30 -49 -25)" filter="url(#glow)"/>
    <rect x="27" y="-35" width="45" height="20" rx="10" fill="var(--warning-fill-rest, #fbbf24)" transform="rotate(30 49 -25)" filter="url(#glow)"/>
    <!-- Human legs -->
    <rect x="-27" y="45" width="20" height="50" rx="10" fill="var(--warning-fill-rest, #fbbf24)" filter="url(#glow)"/>
    <rect x="7" y="45" width="20" height="50" rx="10" fill="var(--warning-fill-rest, #fbbf24)" filter="url(#glow)"/>

    <!-- Glowing aura around human -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="var(--warning-fill-rest, #fbbf24)" stroke-width="3" opacity="0.3" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="var(--warning-fill-rest, #fbbf24)" stroke-width="2" opacity="0.2" filter="url(#glow)"/>
  </g>

  <!-- Robot Agent 1 (Left) — green -->
  <g transform="translate(480, 340)">
    <rect x="-30" y="-40" width="60" height="80" rx="8" fill="currentColor" filter="url(#glow)"/>
    <circle cx="0" cy="-75" r="28" fill="currentColor" filter="url(#glow)"/>
    <circle cx="-11" cy="-80" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="11" cy="-80" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <rect x="-15" y="-65" width="30" height="5" rx="2.5" fill="var(--success-fill-rest, #34d399)"/>
    <rect x="-40" y="-15" width="15" height="12" rx="6" fill="currentColor" filter="url(#glow)"/>
    <rect x="25" y="-15" width="15" height="12" rx="6" fill="currentColor" filter="url(#glow)"/>
  </g>

  <!-- Robot Agent 2 (Right) — purple -->
  <g transform="translate(1440, 340)">
    <rect x="-30" y="-40" width="60" height="80" rx="8" fill="currentColor" filter="url(#glow)"/>
    <circle cx="0" cy="-75" r="28" fill="currentColor" filter="url(#glow)"/>
    <circle cx="-11" cy="-80" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="11" cy="-80" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <rect x="-15" y="-65" width="30" height="5" rx="2.5" fill="var(--info-fill-rest, #a78bfa)"/>
    <rect x="-40" y="-15" width="15" height="12" rx="6" fill="currentColor" filter="url(#glow)"/>
    <rect x="25" y="-15" width="15" height="12" rx="6" fill="currentColor" filter="url(#glow)"/>
  </g>

  <!-- Robot Agent 3 (Left Bottom) — pink -->
  <g transform="translate(480, 740)">
    <rect x="-30" y="-40" width="60" height="80" rx="8" fill="currentColor" filter="url(#glow)"/>
    <circle cx="0" cy="-75" r="28" fill="currentColor" filter="url(#glow)"/>
    <circle cx="-11" cy="-80" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="11" cy="-80" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <rect x="-15" y="-65" width="30" height="5" rx="2.5" fill="var(--error-fill-rest, #f472b6)"/>
    <rect x="-40" y="-15" width="15" height="12" rx="6" fill="currentColor" filter="url(#glow)"/>
    <rect x="25" y="-15" width="15" height="12" rx="6" fill="currentColor" filter="url(#glow)"/>
  </g>

  <!-- Robot Agent 4 (Right Bottom) — gold -->
  <g transform="translate(1440, 740)">
    <rect x="-30" y="-40" width="60" height="80" rx="8" fill="currentColor" filter="url(#glow)"/>
    <circle cx="0" cy="-75" r="28" fill="currentColor" filter="url(#glow)"/>
    <circle cx="-11" cy="-80" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="11" cy="-80" r="6" fill="var(--neutral-layer-1, #fafafa)"/>
    <rect x="-15" y="-65" width="30" height="5" rx="2.5" fill="var(--warning-fill-rest, #fbbf24)"/>
    <rect x="-40" y="-15" width="15" height="12" rx="6" fill="currentColor" filter="url(#glow)"/>
    <rect x="25" y="-15" width="15" height="12" rx="6" fill="currentColor" filter="url(#glow)"/>
  </g>

  <!-- Robot Agent 5 (Top Left) — green -->
  <g transform="translate(640, 200)">
    <rect x="-27" y="-35" width="54" height="70" rx="7" fill="currentColor" filter="url(#glow)"/>
    <circle cx="0" cy="-65" r="25" fill="currentColor" filter="url(#glow)"/>
    <circle cx="-10" cy="-70" r="5" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="10" cy="-70" r="5" fill="var(--neutral-layer-1, #fafafa)"/>
    <rect x="-13" y="-57" width="26" height="4" rx="2" fill="var(--success-fill-rest, #34d399)"/>
    <rect x="-35" y="-12" width="13" height="10" rx="5" fill="currentColor" filter="url(#glow)"/>
    <rect x="22" y="-12" width="13" height="10" rx="5" fill="currentColor" filter="url(#glow)"/>
  </g>

  <!-- Robot Agent 6 (Top Right) — purple -->
  <g transform="translate(1280, 200)">
    <rect x="-27" y="-35" width="54" height="70" rx="7" fill="currentColor" filter="url(#glow)"/>
    <circle cx="0" cy="-65" r="25" fill="currentColor" filter="url(#glow)"/>
    <circle cx="-10" cy="-70" r="5" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="10" cy="-70" r="5" fill="var(--neutral-layer-1, #fafafa)"/>
    <rect x="-13" y="-57" width="26" height="4" rx="2" fill="var(--info-fill-rest, #a78bfa)"/>
    <rect x="-35" y="-12" width="13" height="10" rx="5" fill="currentColor" filter="url(#glow)"/>
    <rect x="22" y="-12" width="13" height="10" rx="5" fill="currentColor" filter="url(#glow)"/>
  </g>

  <!-- Robot Agent 7 (Bottom Left) — pink -->
  <g transform="translate(640, 880)">
    <rect x="-27" y="-35" width="54" height="70" rx="7" fill="currentColor" filter="url(#glow)"/>
    <circle cx="0" cy="-65" r="25" fill="currentColor" filter="url(#glow)"/>
    <circle cx="-10" cy="-70" r="5" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="10" cy="-70" r="5" fill="var(--neutral-layer-1, #fafafa)"/>
    <rect x="-13" y="-57" width="26" height="4" rx="2" fill="var(--error-fill-rest, #f472b6)"/>
    <rect x="-35" y="-12" width="13" height="10" rx="5" fill="currentColor" filter="url(#glow)"/>
    <rect x="22" y="-12" width="13" height="10" rx="5" fill="currentColor" filter="url(#glow)"/>
  </g>

  <!-- Robot Agent 8 (Bottom Right) — gold -->
  <g transform="translate(1280, 880)">
    <rect x="-27" y="-35" width="54" height="70" rx="7" fill="currentColor" filter="url(#glow)"/>
    <circle cx="0" cy="-65" r="25" fill="currentColor" filter="url(#glow)"/>
    <circle cx="-10" cy="-70" r="5" fill="var(--neutral-layer-1, #fafafa)"/>
    <circle cx="10" cy="-70" r="5" fill="var(--neutral-layer-1, #fafafa)"/>
    <rect x="-13" y="-57" width="26" height="4" rx="2" fill="var(--warning-fill-rest, #fbbf24)"/>
    <rect x="-35" y="-12" width="13" height="10" rx="5" fill="currentColor" filter="url(#glow)"/>
    <rect x="22" y="-12" width="13" height="10" rx="5" fill="currentColor" filter="url(#glow)"/>
  </g>

  <!-- Connection lines from human to robots (color-coded to match robot status bars) -->
  <line x1="960" y1="540" x2="480" y2="340" stroke="var(--success-fill-rest, #34d399)" stroke-width="3" opacity="0.4" stroke-dasharray="8,8"/>
  <line x1="960" y1="540" x2="1440" y2="340" stroke="var(--info-fill-rest, #a78bfa)" stroke-width="3" opacity="0.4" stroke-dasharray="8,8"/>
  <line x1="960" y1="540" x2="480" y2="740" stroke="var(--error-fill-rest, #f472b6)" stroke-width="3" opacity="0.4" stroke-dasharray="8,8"/>
  <line x1="960" y1="540" x2="1440" y2="740" stroke="var(--warning-fill-rest, #fbbf24)" stroke-width="3" opacity="0.4" stroke-dasharray="8,8"/>
  <line x1="960" y1="540" x2="640" y2="200" stroke="var(--success-fill-rest, #34d399)" stroke-width="3" opacity="0.4" stroke-dasharray="8,8"/>
  <line x1="960" y1="540" x2="1280" y2="200" stroke="var(--info-fill-rest, #a78bfa)" stroke-width="3" opacity="0.4" stroke-dasharray="8,8"/>
  <line x1="960" y1="540" x2="640" y2="880" stroke="var(--error-fill-rest, #f472b6)" stroke-width="3" opacity="0.4" stroke-dasharray="8,8"/>
  <line x1="960" y1="540" x2="1280" y2="880" stroke="var(--warning-fill-rest, #fbbf24)" stroke-width="3" opacity="0.4" stroke-dasharray="8,8"/>

  <!-- Data particles flowing on connections (color-coded to match connection lines) -->
  <!-- Robot 1 (green) line particle -->
  <circle cx="720" cy="440" r="5" fill="var(--success-fill-rest, #34d399)" filter="url(#glow)"/>
  <!-- Robot 2 (purple) line particle -->
  <circle cx="1200" cy="440" r="5" fill="var(--info-fill-rest, #a78bfa)" filter="url(#glow)"/>
  <!-- Robot 3 (pink) line particle -->
  <circle cx="720" cy="640" r="5" fill="var(--error-fill-rest, #f472b6)" filter="url(#glow)"/>
  <!-- Robot 4 (gold) line particle -->
  <circle cx="1200" cy="640" r="5" fill="var(--warning-fill-rest, #fbbf24)" filter="url(#glow)"/>
  <!-- Robot 5 (green) line particle -->
  <circle cx="800" cy="370" r="5" fill="var(--success-fill-rest, #34d399)" filter="url(#glow)"/>
  <!-- Robot 6 (purple) line particle -->
  <circle cx="1120" cy="370" r="5" fill="var(--info-fill-rest, #a78bfa)" filter="url(#glow)"/>
  <!-- Robot 7 (pink) line particle -->
  <circle cx="800" cy="710" r="5" fill="var(--error-fill-rest, #f472b6)" filter="url(#glow)"/>
  <!-- Robot 8 (gold) line particle -->
  <circle cx="1120" cy="710" r="5" fill="var(--warning-fill-rest, #fbbf24)" filter="url(#glow)"/>

  <!-- Additional data particles for richness -->
  <circle cx="600" cy="500" r="4" fill="var(--success-fill-rest, #34d399)" filter="url(#glow)" opacity="0.7"/>
  <circle cx="1320" cy="500" r="4" fill="var(--info-fill-rest, #a78bfa)" filter="url(#glow)" opacity="0.7"/>
  <circle cx="850" cy="280" r="4" fill="var(--success-fill-rest, #34d399)" filter="url(#glow)" opacity="0.7"/>
  <circle cx="1070" cy="800" r="4" fill="var(--warning-fill-rest, #fbbf24)" filter="url(#glow)" opacity="0.7"/>
</svg>
